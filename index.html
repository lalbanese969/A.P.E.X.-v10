<script type="module">
/* ============================================================================
   [JS:IMPORTS]  —  A.P.E.X. now runs entirely client-side (no backend server).
   These modules (in js/) replace the old Python backend: memory, the AI Center
   (Groq/Gemini, called directly from this browser), the action pipeline, mock
   email/calendar connections, and settings — all backed by localStorage.
   See python_backend_legacy/ for the original Python implementation.
   ============================================================================ */
import * as memoryMod from "./js/memory.js";
import * as pipelineMod from "./js/pipeline.js";
import * as connectionsMod from "./js/connections.js";
import * as settingsMod from "./js/settings.js";
import * as profileMod from "./js/profile.js";
import * as nutritionMod from "./js/nutrition.js";
import { APEX_GREETINGS } from "./js/seedData.js";

/* ============================================================================
   [JS:HONEYCOMB]  —  animated honeycomb background
   ----------------------------------------------------------------------------
   HOW IT WORKS:
   - A STATIC grid of flat-top hexagons fills the chat panel, drawn near-black
     so it's basically invisible (the "hidden honeycomb").
   - The light is made of moving "LIGHT-FORMS". Each form is a HEAD plus a
     trailing CHAIN of nodes (like a comet / snake). As the head turns, the tail
     bends behind it, so the lit shape is an abstract, stretching streak — not a
     plain circle.
   - Forms WANDER (smoothly change direction), STEER back on-screen at the edges,
     PULSE in size, and occasionally SPLIT into two branching streaks.
   - A hex glows by how close it is to any node of any form (bright at the core,
     fading out). Unlit hexes stay near-black.
   - The population is kept >= CONFIG.minForms and a fresh form fades in before an
     old one dies, so the screen is NEVER empty — there is always something moving.

   QUICK TUNING KNOBS are grouped in the CONFIG object just below.
   ============================================================================ */
(function () {
  const canvas = document.getElementById("honeycomb");
  const ctx = canvas.getContext("2d");

  /* ---- CONFIG: tweak the honeycomb feel here ---- */
  const CONFIG = {
    // --- the static honeycomb grid (v9-style rendering) ---
    hexRadius:   40,            // hexagon size, center->vertex (happy medium of v9's 50 and old 26)
    glowColor:   [255, 106, 0], // RGB of the orange glow (v9 tone)
    baseAlpha:   0.06,          // outline opacity of UNLIT hexes (keeps the grid faintly visible)
    glowBoost:   0.80,          // how much glow brightens the outline: alpha = baseAlpha + glow*glowBoost
    bloomBlur:   14,            // bloom blur (px) for bright cells (glow > bloomAt)
    bloomAt:     0.5,           // glow level above which the extra bloom pass kicks in

    // --- how many light-forms are alive (NEVER 0 -> screen is never empty) ---
    minForms:    1,    // always at least this many moving forms on screen
    maxForms:    3,    // never more than this (perf + taste). "1 or 2" usually visible.

    // --- shape of each light-form (head + trailing nodes = a bending streak) ---
    //     low trail counts read like v9's round blobs; high counts read as streaks.
    trailMin:        3,     // fewest tail nodes (small = round, v9-like blob)
    trailMax:        16,    // most tail nodes (large = a streak that stretches across)
    nodeSpacing:     32,    // px gap between trail nodes (bigger = longer reach)
    headRadiusMin:   120,   // glow radius at the head
    headRadiusMax:   250,   // glow radius at the head (bigger = covers more screen)
    tailTaper:       0.5,   // tail radius as fraction of head (1 = even, <1 = comet tail)

    // --- motion (always FORWARD; smooth one-direction curve, no back-and-forth) ---
    speedMin:    0.7,    // slowest travel speed
    speedMax:    2.1,    // fastest travel speed
    curveMax:    0.012,  // each form gently curves ONE way by up to this per frame (no swinging)
    jitter:      0.02,   // tiny random heading jitter (kept small so motion stays smooth)

    // --- life / behavior over time ---
    lifeMin:     520,    // frames a form lives before fading out & respawning
    lifeMax:     1500,
    splitChance: 0.0018, // per-frame chance a form splits into two (branching)
  };

  let hexes = [];   // static hex centers, computed once per resize
  let forms = [];   // moving light-forms (each = a bending streak of nodes)
  let W = 0, H = 0;
  let glowEnabled = true;   // takeovers switch this off so the bg hexes stop glowing during the animation

  /* Build the static hex grid that fills the panel */
  function buildGrid() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    hexes = [];
    const r = CONFIG.hexRadius;
    // FLAT-TOP tiling: hexes are 2r wide (point-to-point) and sqrt(3)*r tall
    // (flat-to-flat). Columns are spaced 1.5r apart and every other COLUMN is
    // nudged down half a row so the flat tops/bottoms interlock.
    const colStep = 1.5 * r;             // horizontal distance between hex centers
    const rowStep = Math.sqrt(3) * r;    // vertical distance between hex centers

    let col = 0;
    for (let x = -r; x < W + r; x += colStep) {
      const yOffset = (col % 2) * (rowStep / 2); // stagger every other column vertically
      for (let y = -rowStep; y < H + rowStep; y += rowStep) {
        hexes.push({ x: x, y: y + yOffset });
      }
      col++;
    }
  }

  function rand(a, b) { return a + Math.random() * (b - a); }

  /* ---- LIGHT-FORM helpers --------------------------------------------------
     A "form" is a HEAD plus a chain of trailing nodes. The head drives; the tail
     follows at a fixed spacing, so when the head turns the whole streak bends.
     ------------------------------------------------------------------------- */

  /* Create one light-form. (x,y,angle) optional — used when SPLITTING so the new
     streak starts where its parent was, heading a slightly different way. */
  function spawnForm(x, y, angle) {
    const hx = (x === undefined) ? rand(0, W) : x;
    const hy = (y === undefined) ? rand(0, H) : y;
    const a  = (angle === undefined) ? Math.random() * Math.PI * 2 : angle;
    const trail = Math.round(rand(CONFIG.trailMin, CONFIG.trailMax));

    // all nodes start stacked on the head; they STRETCH out as the head moves
    // away — this gives forms a nice "growing into existence" birth.
    const nodes = [];
    for (let i = 0; i < trail; i++) nodes.push({ x: hx, y: hy });

    return {
      nodes,
      angle: a,
      speed: rand(CONFIG.speedMin, CONFIG.speedMax),
      headRadius: rand(CONFIG.headRadiusMin, CONFIG.headRadiusMax),
      curRadius: 0,                       // head radius after breathing, set per frame
      turnBias: (Math.random() - 0.5) * 2 * CONFIG.curveMax, // smooth, constant one-way curve
      life: 0,
      maxLife: rand(CONFIG.lifeMin, CONFIG.lifeMax),
      intensity: 0,                       // current brightness (fades in/out)
    };
  }

  /* Ease an angle toward a target angle by `amt` (handles wraparound). */
  function steerToward(a, target, amt) {
    let d = ((target - a + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
    return a + d * amt;
  }

  /* Move + reshape one form for this frame. */
  function updateForm(f) {
    // FLOW: curve smoothly in ONE direction (no oscillating back-and-forth) plus a
    // tiny jitter, so the streak always moves forward and never retracts.
    f.angle += f.turnBias;
    f.angle += (Math.random() - 0.5) * CONFIG.jitter;

    const head = f.nodes[0];
    head.x += Math.cos(f.angle) * f.speed;
    head.y += Math.sin(f.angle) * f.speed;

    // STEER back on-screen: if the head strays past a margin, curve toward center
    const m = 20;
    if (head.x < m || head.x > W - m || head.y < m || head.y > H - m) {
      const toCenter = Math.atan2(H / 2 - head.y, W / 2 - head.x);
      f.angle = steerToward(f.angle, toCenter, 0.06);
    }

    // TAIL FOLLOW: each node sits `nodeSpacing` behind the one in front of it
    for (let i = 1; i < f.nodes.length; i++) {
      const prev = f.nodes[i - 1];
      const cur = f.nodes[i];
      const dx = prev.x - cur.x, dy = prev.y - cur.y;
      const dist = Math.hypot(dx, dy) || 0.0001;
      cur.x = prev.x - (dx / dist) * CONFIG.nodeSpacing;
      cur.y = prev.y - (dy / dist) * CONFIG.nodeSpacing;
    }

    // GROW ONLY: head radius grows in over the first 60 frames, then HOLDS steady —
    // it never shrinks or pulses. (Birth/death are handled by brightness, not size.)
    f.curRadius = f.headRadius * Math.min(1, f.life / 60);

    // LIFE + fade: fade in over first 60 frames, fade out over last 100 — never pops
    f.life++;
    const fadeIn  = Math.min(1, f.life / 60);
    const fadeOut = Math.min(1, (f.maxLife - f.life) / 100);
    f.intensity = Math.max(0, Math.min(fadeIn, fadeOut));
  }

  /* Keep the population alive so the screen is NEVER empty. */
  function maintainForms() {
    forms = forms.filter(f => f.life < f.maxLife);                 // drop fully-dead forms
    while (forms.length < CONFIG.minForms) forms.push(spawnForm()); // enforce minimum
    // crossfade: if every form is near death, bring a fresh one in early so there's overlap
    const allDying = forms.length > 0 && forms.every(f => f.life > f.maxLife * 0.7);
    if (allDying && forms.length < CONFIG.maxForms) forms.push(spawnForm());
  }

  /* Glow contributed at a point by all forms (max over every node).
     Uses v9's smoothstep falloff. No pulsing — brightness only fades in/out with life. */
  function glowAt(px, py) {
    let g = 0;
    for (const f of forms) {
      if (f.intensity <= 0) continue;
      const n = f.nodes.length;
      const taperStep = (1 - CONFIG.tailTaper) / Math.max(1, n - 1);
      for (let i = 0; i < n; i++) {
        const node = f.nodes[i];
        const r = f.curRadius * (1 - taperStep * i);   // head big, tail tapers down
        const dx = px - node.x, dy = py - node.y;
        if (dx > r || dx < -r || dy > r || dy < -r) continue; // cheap reject
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < r) {
          const t = 1 - dist / r;
          const fall = t * t * (3 - 2 * t);            // smoothstep (softer than v*v)
          const lit = fall * f.intensity;
          if (lit > g) g = lit;
        }
      }
    }
    return g > 1 ? 1 : g;
  }

  /* Build a flat-top hexagon path at (cx, cy) with radius r (no stroke/fill).
     Flat-top = vertices at 0,60,120,... so there are flat edges on top and bottom. */
  function hexPath(cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const ang = (Math.PI / 180) * (60 * i); // flat-top orientation (flat edges top & bottom)
      const px = cx + r * Math.cos(ang);
      const py = cy + r * Math.sin(ang);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
  }

  /* Draw one hexagon with v9's 3-pass look:
       1) black interior so cells read crisply on black
       2) outline whose opacity + thickness grow with `glow`
       3) an extra bloom stroke for the brightest cells              */
  function drawHex(cx, cy, r, glow) {
    const [gr, gg, gb] = CONFIG.glowColor;

    // 1) black fill
    hexPath(cx, cy, r - 1.5);
    ctx.fillStyle = "#000";
    ctx.fill();

    // 2) glowing outline (faint baseline, brightening + thickening with glow)
    hexPath(cx, cy, r - 1);
    ctx.strokeStyle = `rgba(${gr},${gg},${gb},${CONFIG.baseAlpha + glow * CONFIG.glowBoost})`;
    ctx.lineWidth = 0.5 + glow * 2.5;
    ctx.stroke();

    // 3) bloom pass for bright cells only
    if (glow > CONFIG.bloomAt) {
      const bloom = (glow - CONFIG.bloomAt) / (1 - CONFIG.bloomAt);
      ctx.shadowColor = `rgba(${gr},${gg},${gb},0.6)`;
      ctx.shadowBlur = bloom * CONFIG.bloomBlur;
      hexPath(cx, cy, r - 1);
      ctx.strokeStyle = `rgba(255,120,0,${bloom * 0.3})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  /* Main animation loop */
  function frame() {
    ctx.clearRect(0, 0, W, H);

    // 1) move + reshape every form
    for (const f of forms) updateForm(f);

    // 2) SPLIT: occasionally a form branches into a second diverging streak
    for (const f of forms) {
      if (forms.length < CONFIG.maxForms && Math.random() < CONFIG.splitChance) {
        const head = f.nodes[0];
        forms.push(spawnForm(head.x, head.y, f.angle + rand(-1.2, 1.2)));
      }
    }

    // 3) keep the population alive (never empty)
    maintainForms();

    // 4) draw every hex, lit by the forms near it
    for (const h of hexes) {
      drawHex(h.x, h.y, CONFIG.hexRadius, glowEnabled ? glowAt(h.x, h.y) : 0);
    }

    requestAnimationFrame(frame);
  }

  /* Init + handle resize */
  function init() {
    buildGrid();
    forms = [];
    for (let i = 0; i < CONFIG.minForms; i++) forms.push(spawnForm());
  }
  window.addEventListener("resize", buildGrid);
  // Rebuild whenever the CHAT PANEL itself changes size (e.g. dragging the iPhone
  // divider) — not just on window resize. This keeps hexagons a FIXED size and shows
  // more/fewer of them to fill the area, instead of stretching (squishing) the bitmap.
  // The moving light-forms then also stay within the chat window's new bounds.
  // (Debounced to one rebuild per frame; changing canvas.width doesn't alter the CSS
  // layout box, so this can't loop.)
  let roPending = false;
  if (window.ResizeObserver) {
    new ResizeObserver(() => {
      if (roPending) return;
      roPending = true;
      requestAnimationFrame(() => { roPending = false; buildGrid(); });
    }).observe(canvas);
  }
  init();
  requestAnimationFrame(frame);

  /* Expose the live moving light-forms (in VIEWPORT coords) so the fullscreen
     takeovers can grow their honeycomb OUT of the same blobs drifting across the
     chat — the reveal appears to BRANCH off the background instead of just
     popping in. Returns each active form's head; falls back to the panel center. */
  window.APEX = window.APEX || {};
  window.APEX.honeycombSeeds = function () {
    const rect = canvas.getBoundingClientRect();
    const seeds = [];
    for (const f of forms) {
      if (f.intensity <= 0.05) continue;
      const head = f.nodes[0];
      seeds.push({ x: rect.left + head.x, y: rect.top + head.y });
    }
    if (!seeds.length) seeds.push({ x: rect.left + W / 2, y: rect.top + H / 2 });
    return seeds;
  };
  // Takeovers call this to stop/restart the background hexes glowing during their animation.
  window.APEX.setHoneycombGlow = function (on) { glowEnabled = !!on; };
})();


/* ============================================================================
   [JS:CHAT]  —  sending messages (runs the pipeline directly, no server)
   ----------------------------------------------------------------------------
   On send, this calls pipeline.handlePrompt() (js/pipeline.js) right here in
   the browser. That runs the Memory Resolver, picks an intent, calls Groq/
   Gemini directly, and returns the response — no backend, no fetch().

   If no AI key is set yet, the pipeline itself returns a graceful "add a key
   in Settings" message — see js/pipeline.js:memoryOnlyFallback.
   ============================================================================ */
(function () {
  const input = document.getElementById("chat-input");
  const sendBtn = document.getElementById("send-btn");
  const messages = document.getElementById("messages");

  let lastDraft = null;   // remembered so "make it shorter" can REFINE the prior draft

  // [PERSONALITY] a different greeting every time — see js/seedData.js:APEX_GREETINGS
  function randomGreeting() {
    return APEX_GREETINGS[Math.floor(Math.random() * APEX_GREETINGS.length)];
  }

  function addMessage(text, who) {
    const div = document.createElement("div");
    div.className = "msg " + who; // who = "user" or "apex"
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight; // auto-scroll to newest
    return div;
  }

  // Render an editable draft card (to / subject / body) inside the chat.
  function renderDraft(draft) {
    lastDraft = draft;
    const card = document.createElement("div");
    card.className = "draft-card";
    card.innerHTML = `
      <div class="dc-head">DRAFT EMAIL</div>
      <label>To</label><input class="dc-to" value="">
      <label>Subject</label><input class="dc-subj" value="">
      <label>Body</label><textarea class="dc-body"></textarea>
      <div class="dc-actions">
        <button class="dc-save">Save draft</button>
      </div>
      <div class="dc-hint">Tip: just type how you want it changed (e.g. "make it shorter") and I'll refine it.</div>`;
    card.querySelector(".dc-to").value = draft.to || "";
    card.querySelector(".dc-subj").value = draft.subject || "";
    card.querySelector(".dc-body").value = draft.body || "";
    card.querySelector(".dc-save").addEventListener("click", () => {
      connectionsMod.createDraft({
        to: card.querySelector(".dc-to").value,
        subject: card.querySelector(".dc-subj").value,
        body: card.querySelector(".dc-body").value,
        accountId: draft.account_id,
      });
      addMessage("(Saved, sir — nothing sent.)", "apex");
    });
    messages.appendChild(card);
    messages.scrollTop = messages.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, "user");
    input.value = "";
    const thinking = addMessage("Thinking, sir…", "apex");

    try {
      const data = await pipelineMod.handlePrompt(text, { priorDraft: lastDraft });
      thinking.textContent = data.apex_response;
      if (data.draft) renderDraft(data.draft);
      // if APEX just added a calendar event, refresh the calendar view so it shows up
      if (data.event && window.APEX.loadCalendar) window.APEX.loadCalendar();
      // Inspect what memory/intent/model was used in DevTools -> Console.
      console.log("[A.P.E.X.]", { intent: data.intent, ai: data.ai_meta, memory: data.memory_packet });
    } catch (err) {
      console.error(err);
      thinking.textContent = "(something went sideways, sir — check DevTools console) you said: \"" + text + "\"";
    }
  }

  function resetChat() {
    messages.innerHTML = `<div class="msg apex">${randomGreeting()}</div>`;
    lastDraft = null;
  }

  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

  // [PERSONALITY] greet with a random line every time the page loads, not just on "New Chat"
  messages.innerHTML = `<div class="msg apex">${randomGreeting()}</div>`;

  window.APEX = window.APEX || {};
  window.APEX.resetChat = resetChat;
})();


/* ============================================================================
   [JS:VIEWS]  —  center view switcher (chat / calendar / email) + left-nav
   ============================================================================ */
(function () {
  // which element ids are visible for each view
  const VIEWS = {
    chat:     ["messages", "input-bar"],
    calendar: ["calendar-view"],
    email:    ["email-view"],
    settings: ["settings-view"],
    logs:     ["logs-view"],
  };
  const ALL = ["messages", "input-bar", "calendar-view", "email-view", "settings-view", "logs-view"];

  function showView(name) {
    if (!VIEWS[name]) name = "chat"; // Actions/Logs not built yet -> chat
    ALL.forEach((id) => {
      const el = document.getElementById(id);
      if (el) el.style.display = VIEWS[name].includes(id) ? "flex" : "none";
    });
    document.querySelectorAll(".nav-item").forEach((n) =>
      n.classList.toggle("active", n.dataset.view === name));
    if (name === "calendar" && window.APEX.loadCalendar) window.APEX.loadCalendar();
    if (name === "email" && window.APEX.loadEmail) window.APEX.loadEmail();
    if (name === "settings" && window.APEX.loadSettings) window.APEX.loadSettings();
    if (name === "logs" && window.APEX.loadLogs) window.APEX.loadLogs();
  }

  window.APEX = window.APEX || {};
  window.APEX.showView = showView;

  document.querySelectorAll(".nav-item").forEach((n) =>
    n.addEventListener("click", () => {
      // Workout / Simulations launch the fullscreen takeovers, not a center view.
      if (n.dataset.action === "big") return window.APEX.openBig();
      if (n.dataset.action === "sim") return window.APEX.openSim();
      showView(n.dataset.view);
    }));
  document.getElementById("new-chat-btn").addEventListener("click", () => {
    if (window.APEX.resetChat) window.APEX.resetChat();
    showView("chat");
  });

  showView("chat"); // normalize initial state
})();


/* ============================================================================
   [JS:CALENDAR]  —  Google-style calendar: WEEK (Sun→Sat, default) + MONTH views
   ============================================================================ */
(function () {
  const bodyEl = document.getElementById("cal-body");
  const titleEl = document.getElementById("cal-title");
  let ref = new Date();        // any date inside the shown week/month
  let mode = "week";           // "week" (default, Sun→Sat) or "month"
  const HH = 44;               // pixels per hour in the week grid

  const MONTHS = ["January", "February", "March", "April", "May", "June",
                  "July", "August", "September", "October", "November", "December"];
  const WD3 = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

  const fmtTime = (iso) => new Date(iso).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  function esc(s) { return (s == null ? "" : String(s)).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
  function fmtHour(h) {
    if (h === 0) return "12 AM"; if (h === 12) return "12 PM";
    return h < 12 ? `${h} AM` : `${h - 12} PM`;
  }
  function weekStartOf(d) { const s = new Date(d); s.setHours(0, 0, 0, 0); s.setDate(s.getDate() - s.getDay()); return s; }
  const sameDay = (a, b) => a.toDateString() === b.toDateString();

  /* ---- WEEK view (Sunday → Saturday) ---- */
  function renderWeek() {
    const start = weekStartOf(ref);
    const days = [...Array(7)].map((_, i) => { const x = new Date(start); x.setDate(start.getDate() + i); return x; });
    const end = days[6];
    const opt = (withYear) => ({ month: "short", day: "numeric", ...(withYear ? { year: "numeric" } : {}) });
    titleEl.textContent = `${start.toLocaleDateString([], opt(false))} – ${end.toLocaleDateString([], opt(true))}`;

    const startMs = start.getTime(), endMs = startMs + 7 * 86400000;
    const evs = connectionsMod.allEvents().filter((e) => {
      const t = new Date(e.start).getTime(); return t >= startMs && t < endMs;
    });
    const today = new Date();

    const headDays = days.map((dt) =>
      `<div class="week-day-head ${sameDay(dt, today) ? "today" : ""}">
         <div class="wd-name">${WD3[dt.getDay()]}</div><div class="wd-num">${dt.getDate()}</div>
       </div>`).join("");

    let times = ""; for (let h = 0; h < 24; h++) times += `<div class="week-hour-label">${fmtHour(h)}</div>`;

    let cols = "";
    for (let i = 0; i < 7; i++) {
      let evHtml = "";
      evs.filter((e) => sameDay(new Date(e.start), days[i])).forEach((e) => {
        const s = new Date(e.start), en = new Date(e.end);
        const top = (s.getHours() + s.getMinutes() / 60) * HH;
        let dur = (en - s) / 3600000; if (!(dur > 0)) dur = 1;
        const h = Math.max(dur * HH, 18);
        const color = settingsMod.getColorById(e.colorId).hex;
        evHtml += `<div class="week-event" data-id="${esc(e.id)}" style="top:${top}px;height:${h}px;background:${color}" title="${esc(e.title)} · ${fmtTime(e.start)}">
          <div>${esc(e.title)}</div><div class="we-time">${fmtTime(e.start)}</div></div>`;
      });
      cols += `<div class="week-col">${evHtml}</div>`;
    }

    bodyEl.innerHTML = `
      <div class="week-head"><div></div><div class="wh-days">${headDays}</div></div>
      <div class="week-body" id="week-scroll">
        <div class="week-times">${times}</div>
        <div class="week-cols">${cols}</div>
      </div>`;
    const sc = document.getElementById("week-scroll");
    if (sc) sc.scrollTop = 7 * HH; // open around 7 AM
  }

  /* ---- MONTH view ---- */
  function renderMonth() {
    const y = ref.getFullYear(), m = ref.getMonth();
    titleEl.textContent = `${MONTHS[m]} ${y}`;
    const events = connectionsMod.eventsForMonth(y, m);
    const byDay = {};
    events.forEach((e) => { const d = new Date(e.start).getDate(); (byDay[d] = byDay[d] || []).push(e); });

    const startDow = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const daysInPrev = new Date(y, m, 0).getDate();
    const today = new Date();
    const isThisMonth = today.getFullYear() === y && today.getMonth() === m;

    let cells = "";
    for (let i = 0; i < 42; i++) {
      const dayNum = i - startDow + 1;
      const inMonth = dayNum >= 1 && dayNum <= daysInMonth;
      const shown = inMonth ? dayNum : (dayNum < 1 ? daysInPrev + dayNum : dayNum - daysInMonth);
      const isToday = inMonth && isThisMonth && dayNum === today.getDate();
      let evHtml = "";
      if (inMonth && byDay[dayNum]) {
        byDay[dayNum].slice(0, 3).forEach((e) => {
          const color = settingsMod.getColorById(e.colorId).hex;
          evHtml += `<div class="cal-event" data-id="${esc(e.id)}" style="background:${color}" title="${esc(e.title)} · ${fmtTime(e.start)}">${esc(e.title)}</div>`;
        });
        if (byDay[dayNum].length > 3) evHtml += `<div class="cal-more">+${byDay[dayNum].length - 3} more</div>`;
      }
      cells += `<div class="cal-cell ${inMonth ? "" : "dim"} ${isToday ? "today" : ""}"><span class="daynum">${shown}</span>${evHtml}</div>`;
    }
    bodyEl.innerHTML = `
      <div class="cal-weekdays"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
      <div class="cal-grid">${cells}</div>`;
  }

  function render() {
    document.getElementById("cal-mode-week").classList.toggle("active", mode === "week");
    document.getElementById("cal-mode-month").classList.toggle("active", mode === "month");
    try { mode === "week" ? renderWeek() : renderMonth(); }
    catch (e) { console.error(e); bodyEl.innerHTML = '<div class="cal-more" style="padding:12px">Calendar error — see console.</div>'; }
  }

  function step(delta) {
    if (mode === "week") ref.setDate(ref.getDate() + delta * 7);
    else ref.setMonth(ref.getMonth() + delta);
    render();
  }

  document.getElementById("cal-prev").addEventListener("click", () => step(-1));
  document.getElementById("cal-next").addEventListener("click", () => step(1));
  document.getElementById("cal-today").addEventListener("click", () => { ref = new Date(); render(); });
  document.getElementById("cal-mode-week").addEventListener("click", () => { mode = "week"; render(); });
  document.getElementById("cal-mode-month").addEventListener("click", () => { mode = "month"; render(); });

  /* ---- event detail popover (click an event, like Google Calendar) ---- */
  const ICON = {
    clock: `<svg class="ep-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5v5l3 2"/></svg>`,
    pin:   `<svg class="ep-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.2 7-11a7 7 0 1 0-14 0c0 4.8 7 11 7 11z"/><circle cx="12" cy="10" r="2.4"/></svg>`,
    note:  `<svg class="ep-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M5 6h14M5 12h14M5 18h9"/></svg>`,
  };

  function closePopover() {
    document.getElementById("event-pop")?.remove();
    document.getElementById("event-pop-backdrop")?.remove();
  }

  function openPopover(anchorEl, id) {
    const ev = connectionsMod.getEventById(id);
    if (!ev) return;
    closePopover();

    const color = settingsMod.getColorById(ev.colorId);
    const s = new Date(ev.start);
    const dateLine = s.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });
    const timeLine = `${fmtTime(ev.start)} – ${fmtTime(ev.end)}`;
    const cat = settingsMod.getCalendarCategories()[ev.colorId];
    const isDefault = ev.colorId === settingsMod.getDefaultColorId();
    const colorLine = `${color.name}${cat ? ` · ${esc(cat)}` : (isDefault ? " · default / Other" : "")}`;

    const backdrop = document.createElement("div");
    backdrop.id = "event-pop-backdrop";
    const pop = document.createElement("div");
    pop.id = "event-pop";
    pop.innerHTML = `
      <div class="ep-bar" style="background:${color.hex}"></div>
      <div class="ep-body">
        <button class="ep-close" aria-label="Close">×</button>
        <div class="ep-title">${esc(ev.title)}</div>
        <div class="ep-row">${ICON.clock}<div>${dateLine}<br>${timeLine}</div></div>
        ${ev.location ? `<div class="ep-row">${ICON.pin}<div>${esc(ev.location)}</div></div>` : ""}
        ${ev.notes ? `<div class="ep-row">${ICON.note}<div>${esc(ev.notes)}</div></div>` : ""}
        <div class="ep-row"><span class="ep-dot" style="background:${color.hex}"></span><div>${colorLine}</div></div>
        <div class="ep-actions"><button class="ep-del">Delete event</button></div>
      </div>`;
    document.body.appendChild(backdrop);
    document.body.appendChild(pop);

    // position near the clicked event, clamped to the viewport
    const r = anchorEl.getBoundingClientRect();
    let left = r.right + 8;
    if (left + 290 > window.innerWidth - 12) left = r.left - 298;
    if (left < 12) left = 12;
    let top = r.top;
    const ph = pop.offsetHeight;
    if (top + ph > window.innerHeight - 12) top = window.innerHeight - ph - 12;
    if (top < 12) top = 12;
    pop.style.left = left + "px";
    pop.style.top = top + "px";

    backdrop.addEventListener("click", closePopover);
    pop.querySelector(".ep-close").addEventListener("click", closePopover);
    pop.querySelector(".ep-del").addEventListener("click", () => {
      connectionsMod.deleteCalendarEvent(id);
      closePopover();
      render();
    });
  }

  bodyEl.addEventListener("click", (e) => {
    const el = e.target.closest("[data-id]");
    if (el) openPopover(el, el.dataset.id);
  });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closePopover(); });

  window.APEX = window.APEX || {};
  window.APEX.loadCalendar = render;
})();


/* ============================================================================
   [JS:LOGS]  —  backend-call log (mock data) + a REAL settings UI for defining
   scheduled timers. Timers you add here are saved (localStorage via
   js/connections.js) but NOTHING executes them yet — there is no scheduler/
   automation engine wired up. This is the configuration surface for that
   future system, built ahead of the execution logic on purpose.
   ============================================================================ */
(function () {
  const body = document.getElementById("logs-body");
  function esc(s) { return (s == null ? "" : String(s)).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
  function relTime(iso) {
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 3600) return Math.round(diff / 60) + "m ago";
    if (diff < 86400) return Math.round(diff / 3600) + "h ago";
    return Math.round(diff / 86400) + "d ago";
  }

  function timerRow(t) {
    return `
      <div class="timer-row" data-id="${esc(t.id)}">
        <div>
          <div class="timer-name">${esc(t.name)}</div>
          <div class="timer-sched">${esc(connectionsMod.describeSchedule(t))} · next: ${esc(connectionsMod.estimateNext(t))}</div>
        </div>
        <div class="timer-actions">
          <button class="timer-toggle ${t.enabled ? "on" : "off"}" data-action="toggle">${t.enabled ? "ENABLED" : "OFF"}</button>
          <button class="timer-del" data-action="delete" title="Delete timer">✕</button>
        </div>
      </div>`;
  }

  function addTimerFormHtml() {
    return `
      <div class="add-timer">
        <div class="logs-note" style="margin-bottom:8px;">Add a scheduled timer (config only — won't run anything yet):</div>
        <div class="add-timer-grid">

          <div><label>Type</label>

              <option value="weekly">Weekly</option>
              <option value="interval">Every N hours</option>
            </select>
          </div>

          <div id="nt-field3"><label>&nbsp;</label></div>
          <button class="add-timer-btn" id="nt-add">Add</button>
        </div>
      </div>`;
  }

  function updateAddFormFields() {
    const type = document.getElementById("nt-type").value;
    const f2 = document.getElementById("nt-field2"), f3 = document.getElementById("nt-field3");
    if (type === "weekly") {
      f2.innerHTML = `<label>Day</label><select id="nt-day">
        <option value="0">Sunday</option><option value="1">Monday</option><option value="2">Tuesday</option>
        <option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option><option value="6">Saturday</option>
      </select>`;
      f3.innerHTML = `<label>Time</label><input id="nt-time" type="time" value="08:00">`;
    } else if (type === "interval") {
      f2.innerHTML = `<label>Every (hours)</label><input id="nt-interval" type="number" min="1" max="168" value="6">`;
      f3.innerHTML = `<label>&nbsp;</label>`;
    } else { // daily
      f2.innerHTML = `<label>Time</label><input id="nt-time" type="time" value="08:00">`;
      f3.innerHTML = `<label>&nbsp;</label>`;
    }
  }

  function loadLogs() {
    try {
      const timers = connectionsMod.listTimers();
      const logs = connectionsMod.listBackendLogs();

      body.innerHTML = `
        <div class="logs-section-title">Scheduled timers</div>
        <div class="automation-warn">These timers are saved as configuration only. There is no automation engine running yet, so enabling a timer here does not make anything execute — this is the settings surface for that future system.</div>
        <div id="timer-list">${timers.map(timerRow).join("") || '<div class="logs-note">No timers yet.</div>'}</div>
        ${addTimerFormHtml()}

        <div class="logs-section-title">Recent backend activity</div>
        <div class="logs-note">Logs of calls APEX makes when it runs on its own (triggers, automations, APIs) — what it did and when. (Mock for now.)</div>
        ${logs.map((l) => `
          <div class="log-row">
            <div class="log-time">${relTime(l.time)}</div>
            <div class="log-body">
              <div class="log-action">${esc(l.action)}</div>
              <div class="log-detail">${esc(l.detail)}</div>
            </div>
            <div class="log-meta">
              <span class="log-src">${esc(l.source)}</span>
              <span class="log-status ${esc(l.status)}">${esc(l.status)}</span>
            </div>
          </div>`).join("")}`;

      document.getElementById("nt-type").addEventListener("change", updateAddFormFields);
      document.getElementById("nt-add").addEventListener("click", () => {

/* ============================================================================
   [JS:TAKEOVER]  —  reusable fullscreen honeycomb takeover.
   The honeycomb GROWS OUT of the live blobs moving across the chat (seeded from
   window.APEX.honeycombSeeds), branching organically until the screen is full,
   then CLEARS from the center outward until EVERY hex is gone (no leftover edge
   frame), fading in `content` underneath. Esc / the close button reverses it.
   Shared by /open sim (iframe) and /big (the Workout APEX panel).
   ============================================================================ */
function makeTakeover({ overlay, canvas, closeBtn, content, onFirstOpen }) {
  const ctx = canvas.getContext("2d");

  // --- timeline (ms) --- grow (organic fill), brief hold, then clear (reveal)
  const GROW_MS = 1300, HOLD_MS = 200, CLEAR_MS = 1300;   // open ≈ 2.8s
  const TOTAL = GROW_MS + HOLD_MS + CLEAR_MS;
  const CLOSE_MS = 1400;          // closing speed unchanged (user likes it fast)
  const BAND = 0.16;              // softness of each wavefront (fraction of progress)
  const JITTER = 0.14;            // raggedness so growth/clear look organic, not a clean ring
  const HEXR = 30;                // hexagon size

  let hexes = [], growT = [], clearT = [];   // per-hex thresholds (0..1), baked on open
  let W = 0, H = 0, raf = null, startTs = 0, opening = true, firstOpened = false;

  function build() {
    const dpr = window.devicePixelRatio || 1;
    // Size to the OVERLAY's real box — it's `position:fixed; inset:0`, i.e. TRUE
    // fullscreen. (Using window.innerHeight here was the bug: on iPhone, Safari's
    // toolbars make innerHeight shorter than the overlay, so the honeycomb only
    // covered the top of the screen. The overlay box is always the whole screen.)
    const rect = overlay.getBoundingClientRect();
    W = Math.round(rect.width) || window.innerWidth;
    H = Math.round(rect.height) || window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    hexes = [];
    const r = HEXR, colStep = 1.5 * r, rowStep = Math.sqrt(3) * r;
    let col = 0;
    for (let x = -r; x < W + r; x += colStep) {
      const yOff = (col % 2) * (rowStep / 2);
      for (let y = -r; y < H + rowStep; y += rowStep) hexes.push({ x, y: y + yOff });
      col++;
    }
  }

  // Bake each hex's grow order (distance from the nearest live blob → branches out
  // from the moving light-forms) and clear order (distance from center → clears
  // from the middle out). Jitter keeps both wavefronts ragged/organic.
  function computeThresholds() {
    const seeds = (window.APEX && window.APEX.honeycombSeeds)
      ? window.APEX.honeycombSeeds() : [{ x: W / 2, y: H / 2 }];
    const cx = W / 2, cy = H / 2;
    const gd = new Array(hexes.length), cd = new Array(hexes.length);
    let maxG = 0.0001, maxC = 0.0001;
    for (let i = 0; i < hexes.length; i++) {
      const h = hexes[i];
      let dmin = Infinity;
      for (const s of seeds) { const d = Math.hypot(h.x - s.x, h.y - s.y); if (d < dmin) dmin = d; }
      gd[i] = dmin; if (dmin > maxG) maxG = dmin;
      cd[i] = Math.hypot(h.x - cx, h.y - cy); if (cd[i] > maxC) maxC = cd[i];
    }
    growT = new Array(hexes.length); clearT = new Array(hexes.length);
    for (let i = 0; i < hexes.length; i++) {
      growT[i]  = Math.max(0, Math.min(1, gd[i] / maxG + (Math.random() - 0.5) * 2 * JITTER));
      clearT[i] = Math.max(0, Math.min(1, cd[i] / maxC + (Math.random() - 0.5) * 2 * JITTER));
    }
  }

  function hexPath(cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (Math.PI / 180) * (60 * i);
      const px = cx + r * Math.cos(a), py = cy + r * Math.sin(a);
      i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
    }
    ctx.closePath();
  }
  // Match the background honeycomb's glow look (same tone + bloom) so the two blend.
  function drawHex(cx, cy, r, glow) {
    const a = Math.min(glow, 1);
    hexPath(cx, cy, r);
    ctx.strokeStyle = `rgba(255,106,0,${0.05 + a * 0.85})`;
    ctx.lineWidth = 0.5 + a * 2.4;
    if (a > 0.5) { ctx.shadowColor = "rgba(255,106,0,0.55)"; ctx.shadowBlur = (a - 0.5) * 2 * 14; }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // lit value 0..1 for a hex at a given elapsed time on the timeline
  function litAt(i, elapsed) {
    if (elapsed <= GROW_MS) {
      const p = elapsed / GROW_MS;
      return Math.max(0, Math.min(1, (p * (1 + BAND) - growT[i]) / BAND));
    }
    if (elapsed <= GROW_MS + HOLD_MS) return 1;
    const q = (elapsed - GROW_MS - HOLD_MS) / CLEAR_MS;
    return 1 - Math.max(0, Math.min(1, (q * (1 + BAND) - clearT[i]) / BAND));
  }
  function contentOpacity(elapsed) {
    if (elapsed <= GROW_MS + HOLD_MS) return 0;               // hidden while the screen fills
    const q = (elapsed - GROW_MS - HOLD_MS) / CLEAR_MS;
    return Math.min(1, q * 1.3);                              // fade up as the center clears
  }
  // Black backdrop stays CLEAR for the first ~55% of the grow (so you clearly watch the
  // hexes build over the live screen), then eases to black by the time it's full. Stays
  // black for the hold + clear. Reverses automatically on close.
  function backdropAlpha(elapsed) {
    if (elapsed >= GROW_MS) return 1;
    const p = elapsed / GROW_MS;
    return p < 0.55 ? 0 : Math.pow((p - 0.55) / 0.45, 1.5);
  }
  function draw(elapsed) {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < hexes.length; i++) {
      const lit = litAt(i, elapsed);
      if (lit > 0.02) drawHex(hexes[i].x, hexes[i].y, HEXR * (0.35 + 0.65 * lit), lit);
    }
    content.style.opacity = contentOpacity(elapsed);
    overlay.style.background = "rgba(10,10,11," + backdropAlpha(elapsed) + ")";
  }
  function frame(ts) {
    if (!startTs) startTs = ts;
    const dur = opening ? TOTAL : CLOSE_MS;
    const prog = Math.min(1, (ts - startTs) / dur);
    const elapsed = (opening ? prog : 1 - prog) * TOTAL;
    draw(elapsed);
    if (prog < 1) { raf = requestAnimationFrame(frame); }
    else {
      raf = null; startTs = 0;
      if (opening) { content.style.opacity = 1; closeBtn.style.display = "flex"; }
      else {
        overlay.classList.remove("on"); ctx.clearRect(0, 0, W, H);
        if (window.APEX && window.APEX.setHoneycombGlow) window.APEX.setHoneycombGlow(true);  // restore bg glow
      }
    }
  }

  function open() {
    if (overlay.classList.contains("on")) return;
    if (!firstOpened) { firstOpened = true; if (onFirstOpen) onFirstOpen(); }
    overlay.classList.add("on");
    build();
    computeThresholds();   // captures the live blob seeds while it's still glowing...
    if (window.APEX && window.APEX.setHoneycombGlow) window.APEX.setHoneycombGlow(false);  // ...then stop the bg glow
    closeBtn.style.display = "none";
    content.style.opacity = 0;
    overlay.style.background = "rgba(10,10,11,0)";   // start transparent -> the old screen shows through the grow
    opening = true; startTs = 0;
    cancelAnimationFrame(raf); raf = requestAnimationFrame(frame);
  }
  function close() {
    if (!overlay.classList.contains("on")) return;
    closeBtn.style.display = "none";
    opening = false; startTs = 0;
    cancelAnimationFrame(raf); raf = requestAnimationFrame(frame);
  }

  closeBtn.addEventListener("click", close);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && overlay.classList.contains("on")) close();
  });
  // keep the canvas full-screen if the viewport changes while open (rotate, toolbar show/hide)
  window.addEventListener("resize", () => {
    if (!overlay.classList.contains("on")) return;
    build();
    if (raf) computeThresholds();   // mid-animation: rebuild growth for the new geometry
  });

  return { open, close };
}

/* /open sim — the Simulations lab, lazily loaded into an iframe on first open. */
(function () {
  const iframe = document.getElementById("sim-iframe");
  const sim = makeTakeover({
    overlay: document.getElementById("sim-overlay"),
    canvas: document.getElementById("sim-hex"),
    closeBtn: document.getElementById("sim-close"),
    content: iframe,
    onFirstOpen: () => iframe.setAttribute("src", "apex-simulations/index.html"),
  });
  window.APEX = window.APEX || {};
  window.APEX.openSim = sim.open;
  window.APEX.closeSim = sim.close;
})();


/* ============================================================================
   [JS:BIG]  —  "Workout APEX" (/big). APEX's personal-trainer mode: a live COACH
   chat on the LEFT (pipeline.handleCoachPrompt — fitness-focused, skips the
   email/calendar action machinery) and tabbed panels on the RIGHT:
     • Nutrition — macros vs. goal, a water jug (orange fill, logged in fl oz), food log
     • Workout   — today's exercises, tap to check off, progress
     • Metrics   — sleep / steps / HR / weight (Apple Watch sync is a LATER phase; sample data)
   Tabs switch on click or ←/→ arrows. Today's nutrition/water/workout are tracked
   in localStorage (apex.big.day) and reset each new day. Units: imperial (oz/lb).
   Responsive: iPad = side-by-side; iPhone = stacked (panels on top, chat at bottom).
   ============================================================================ */
(function () {
  const big = makeTakeover({
    overlay: document.getElementById("big-overlay"),
    canvas: document.getElementById("big-hex"),
    closeBtn: document.getElementById("big-close"),
    content: document.getElementById("big-app"),
  });
  window.APEX = window.APEX || {};
  window.APEX.closeBig = big.close;

  /* ---------- today's workout (nutrition + water now live in js/nutrition.js;
       calorie/macro targets come from js/profile.js). `day` below only holds
       the workout check-offs. ---------- */
  const WORKOUT = {
    title: "Push Day",
    ex: [
      { name: "Bench Press",            sets: "4 × 8"  },
      { name: "Overhead Press",         sets: "3 × 10" },
      { name: "Incline Dumbbell Press", sets: "3 × 10" },
      { name: "Cable Fly",              sets: "3 × 12" },
      { name: "Triceps Pushdown",       sets: "3 × 15" },
    ],
  };

  /* ---------- today's tracking, persisted to localStorage (resets each new day) ---------- */
  const DAY_KEY = "apex.big.day";
  const todayStr = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  };
  const emptyDay = () => ({ date: todayStr(), foods: [], water: 0, done: WORKOUT.ex.map(() => false) });
  const demoDay = () => ({
    date: todayStr(), water: 24, done: WORKOUT.ex.map(() => false),
    foods: [
      { name: "Oatmeal + banana",    kcal: 320, p: 10, c: 60, f: 6  },
      { name: "Chicken & rice bowl", kcal: 610, p: 45, c: 70, f: 14 },
      { name: "Protein shake",       kcal: 180, p: 30, c: 8,  f: 3  },
    ],
  });
  function loadDay() { try { return JSON.parse(localStorage.getItem(DAY_KEY)); } catch (e) { return null; } }
  function saveDay() { try { localStorage.setItem(DAY_KEY, JSON.stringify(day)); } catch (e) {} }

  let stored = loadDay(), day;
  if (stored && stored.date === todayStr()) day = stored;   // same day → resume
  else if (stored) day = emptyDay();                        // new day → fresh empty
  else { day = demoDay(); saveDay(); }                      // first run ever → sample data
  if (!Array.isArray(day.done) || day.done.length !== WORKOUT.ex.length) {
    day.done = WORKOUT.ex.map((_, i) => !!(day.done && day.done[i]));
  }

  /* ---------- tabs ---------- */
  const TABS = [{ id: "nutrition", label: "Nutrition" }, { id: "workout", label: "Workout" }, { id: "metrics", label: "Metrics" }];
  let activeTab = 0;
  let editingId = null;   // id of the logged food currently being edited (inline editor)
  const panels = document.getElementById("big-panels");

  function macroRow(m) {
    const pct = Math.min(100, Math.round((m.val / m.goal) * 100));
    return `<div class="macro-row">
      <div class="macro-top"><span class="ml">${m.label}</span>
        <span class="mv"><b>${m.val}</b> / ${m.goal} ${m.unit}</span></div>
      <div class="macro-bar"><div class="macro-fill ${m.cls}" style="width:${pct}%"></div></div>
    </div>`;
  }
  // weight/volume amounts read as "10 oz turkey"; countable items as "2× banana"
  const MEASURE_UNITS = new Set(["oz", "ounce", "ounces", "g", "gram", "grams", "kg", "ml", "l", "liter", "litre", "cup", "cups", "tbsp", "tsp", "fl oz"]);
  function fmtQty(qty, unit, name) {
    const u = (unit || "").toLowerCase().trim();
    if (u && MEASURE_UNITS.has(u)) return `${qty} ${u} ${name}`;
    return qty > 1 ? `${qty}× ${name}` : name;
  }
  const escAttr = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
  function entryRow(f) {
    if (editingId === f.id) return editorRow(f);
    return `<div class="food-item"><span class="fname">${fmtQty(f.qty, f.unit, f.name)}` +
      `${f.source === "memory" ? ' <span class="mem-tag">remembered</span>' : ""}</span>` +
      `<span class="fkcal">${f.calories} kcal · ${f.protein}p ${f.carbs}c ${f.fat}f</span>` +
      `<button class="food-edit" data-id="${f.id}" title="Edit" aria-label="Edit">✎</button>` +
      `<button class="food-x" data-id="${f.id}" title="Remove" aria-label="Remove">×</button></div>`;
  }
  // inline editor for one logged item — edit the name/amount/macros, and (optionally)
  // teach it to the food memory so future logs of this food are accurate.
  function editorRow(f) {
    return `<div class="food-item food-edit-row" data-id="${f.id}">
      <input class="fe fe-name" value="${escAttr(f.name)}" placeholder="food name">
      <div class="fe-line">
        <input class="fe fe-qty" type="number" step="any" value="${f.qty}" title="quantity">
        <input class="fe fe-unit" value="${escAttr(f.unit || "")}" placeholder="unit (oz, cup, each)">
      </div>
      <div class="fe-line">
        <input class="fe fe-cal" type="number" value="${f.calories}" placeholder="cal">
        <input class="fe fe-pp"  type="number" value="${f.protein}"  placeholder="P">
        <input class="fe fe-cc"  type="number" value="${f.carbs}"    placeholder="C">
        <input class="fe fe-ff"  type="number" value="${f.fat}"      placeholder="F">
      </div>
      <div class="fe-line fe-actions">
        <label class="fe-learn"><input type="checkbox" class="fe-learn-cb" checked> remember for next time</label>
        <button class="fe-cancel">Cancel</button>
        <button class="fe-save" data-id="${f.id}">Save</button>
      </div>
    </div>`;
  }
  function exRow(e, i) {
    return `<div class="wo-ex ${day.done[i] ? "done" : ""}" data-i="${i}">
      <span class="wo-check"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span class="wo-name">${e.name}</span><span class="wo-sets">${e.sets}</span></div>`;
  }

  function nutritionHTML() {
    const t = nutritionMod.dayTotals();
    const g = profileMod.dailyGoal();
    const foods = nutritionMod.getDay().foods;
    const clamp = (v, goal) => Math.min(100, Math.round((v / goal) * 100));
    const wpct = clamp(t.water_oz, g.water_oz), calpct = clamp(t.calories, g.kcal);
    const M = [
      { label: "Protein", val: Math.round(t.protein), goal: g.protein, unit: "g", cls: "p"  },
      { label: "Carbs",   val: Math.round(t.carbs),   goal: g.carbs,   unit: "g", cls: "c"  },
      { label: "Fat",     val: Math.round(t.fat),     goal: g.fat,     unit: "g", cls: "f"  },
      { label: "Fiber",   val: Math.round(t.fiber),   goal: g.fiber,   unit: "g", cls: "fb" },
    ];
    return `
      <div class="bcard hero-row">
        <div class="hero-cal">
          <div class="bcard-title">Calories</div>
          <div class="cal-big"><b>${Math.round(t.calories)}</b><span>/ ${g.kcal}</span></div>
          <div class="macro-bar big"><div class="macro-fill" style="width:${calpct}%"></div></div>
          <div class="bcard-note">${Math.max(0, g.kcal - Math.round(t.calories))} kcal left · target is an estimate</div>
        </div>
        <div class="bottle-wrap">
          <div class="bottle"><div class="bottle-cap"></div><div class="bottle-fill" style="height:${wpct}%"></div><div class="bottle-pct">${t.water_oz}<small>oz</small></div></div>
          <div class="bcard-note" style="text-align:center;">water · ${wpct}% of ${g.water_oz}</div>
        </div>
      </div>
      <div class="bcard">
        <div class="bcard-head"><span class="bcard-title">Macros</span><span class="bcard-note">vs. goal</span></div>
        ${M.map(macroRow).join("")}
      </div>
      <div class="bcard">
        <div class="bcard-head"><span class="bcard-title">Today's food</span><span class="bcard-note">log by telling APEX →</span></div>
        <div id="food-list">${foods.length ? foods.map(entryRow).join("")
          : `<div class="bcard-note">Nothing logged yet — just tell APEX in chat: “I ate 2 eggs and a bagel” or “drank 24 oz”.</div>`}</div>
        <div style="text-align:right;"><button id="reset-day" class="reset-day-btn">Reset today</button></div>
      </div>`;
  }
  function workoutHTML() {
    const done = day.done.filter(Boolean).length;
    const woPct = Math.round((done / WORKOUT.ex.length) * 100);
    return `
      <div class="bcard">
        <div class="bcard-head"><span class="bcard-title">Today · ${WORKOUT.title}</span><span class="bcard-note">tap to check off</span></div>
        <div id="wo-list">${WORKOUT.ex.map(exRow).join("")}</div>
        <div class="wo-progress">
          <div class="wp-bar"><div class="wp-fill" style="width:${woPct}%"></div></div>
          <span class="wp-txt">${done}/${WORKOUT.ex.length} done</span>
        </div>
        <div class="wo-streak">Streak: 5 days — keep it up, sir.</div>
      </div>`;
  }
  function metricsHTML() {
    const stats = [
      { label: "Sleep last night", value: `7h 32<small>m</small>` },
      { label: "Steps today",      value: `8,410` },
      { label: "Resting HR",       value: `58<small> bpm</small>` },
      { label: "Weight",           value: `182<small> lb</small>` },
    ];
    return `
      <div class="bcard">
        <div class="bcard-head"><span class="bcard-title">Health Metrics</span><span class="bcard-note">sample data</span></div>
        <div class="metric-grid">${stats.map((s) => `<div class="metric"><div class="m-label">${s.label}</div><div class="m-value">${s.value}</div></div>`).join("")}</div>
        <div class="watch-note" style="margin-top:14px;"><b>Apple Watch sync — coming later.</b> These are sample values for now. Once it's wired up, APEX will pull your real sleep, steps, heart rate and weight so it can coach around how you actually recovered.
          <button class="watch-btn" disabled>Connect Apple Watch (coming soon)</button>
        </div>
      </div>`;
  }

  function render() {
    const bar = `<div class="big-tabs">${TABS.map((t, i) =>
      `<button class="big-tab ${i === activeTab ? "active" : ""}" data-tab="${i}">${t.label}</button>`).join("")}</div>`;
    const body = TABS[activeTab].id === "nutrition" ? nutritionHTML()
               : TABS[activeTab].id === "workout"   ? workoutHTML()
               : metricsHTML();
    panels.innerHTML = bar + `<div class="big-tabbody">${body}</div>`;
    wire();
  }
  function wire() {
    panels.querySelectorAll(".big-tab").forEach((b) =>
      b.addEventListener("click", () => { activeTab = +b.dataset.tab; render(); }));
    // nutrition + water are logged by talking to APEX (see the coach chat send()), not buttons.
    const rd = document.getElementById("reset-day");
    if (rd) rd.addEventListener("click", () => {
      if (confirm("Clear today's food & water log? (your saved foods and code words are kept)")) {
        nutritionMod.clearDay(); render();
      }
    });
    // × on a logged item removes just that entry
    panels.querySelectorAll(".food-x").forEach((b) =>
      b.addEventListener("click", () => { nutritionMod.removeFoodEntry(b.dataset.id); render(); }));
    // ✎ opens the inline editor for that item
    panels.querySelectorAll(".food-edit").forEach((b) =>
      b.addEventListener("click", () => { editingId = b.dataset.id; render(); }));
    panels.querySelectorAll(".fe-cancel").forEach((b) =>
      b.addEventListener("click", () => { editingId = null; render(); }));
    panels.querySelectorAll(".fe-save").forEach((b) =>
      b.addEventListener("click", () => {
        const row = b.closest(".food-edit-row"), g = (s) => row.querySelector(s);
        const patch = {
          name: g(".fe-name").value,
          qty: parseFloat(g(".fe-qty").value) || 1,
          unit: g(".fe-unit").value.trim(),
          calories: parseFloat(g(".fe-cal").value) || 0,
          protein: parseFloat(g(".fe-pp").value) || 0,
          carbs: parseFloat(g(".fe-cc").value) || 0,
          fat: parseFloat(g(".fe-ff").value) || 0,
        };
        const updated = nutritionMod.updateFoodEntry(b.dataset.id, patch);
        if (updated && g(".fe-learn-cb").checked) nutritionMod.learnFromEntry(updated);   // teach the memory
        editingId = null; render();
      }));
    panels.querySelectorAll("#wo-list .wo-ex").forEach((el) =>
      el.addEventListener("click", () => { const i = +el.dataset.i; day.done[i] = !day.done[i]; saveDay(); render(); }));
  }
  render();

  // ←/→ cycle tabs while /big is open (but not while typing in a field)
  document.addEventListener("keydown", (e) => {
    if (!document.getElementById("big-overlay").classList.contains("on")) return;
    const tag = (document.activeElement && document.activeElement.tagName) || "";
    if (tag === "INPUT" || tag === "TEXTAREA") return;
    if (e.key === "ArrowRight") { e.preventDefault(); activeTab = (activeTab + 1) % TABS.length; render(); }
    else if (e.key === "ArrowLeft") { e.preventDefault(); activeTab = (activeTab - 1 + TABS.length) % TABS.length; render(); }
  });

  /* ---------- left-side COACH chat (fitness-focused; skips the action pipeline) ---------- */
  const messages = document.getElementById("big-messages");
  const input = document.getElementById("big-input");
  const sendBtn = document.getElementById("big-send");
  let greeted = false;

  function addMessage(text, who) {
    const div = document.createElement("div");
    div.className = "msg " + who;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }
  async function send() {
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, "user");
    input.value = "";
    const thinking = addMessage("Thinking, sir…", "apex");
    try {
      const data = await pipelineMod.handleCoachPrompt(text);
      thinking.textContent = data.apex_response;
      // If APEX just changed the food/water numbers, jump to Nutrition so the bars move.
      if (typeof data.intent === "string" && data.intent.startsWith("nutrition")) activeTab = 0;
      render();
      console.log("[A.P.E.X./coach]", { intent: data.intent, ai: data.ai_meta });
    } catch (err) {
      console.error(err);
      thinking.textContent = "(something went sideways, sir — check DevTools console)";
    }
  }
  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

  // greet once (the first time /big opens) and focus the input after the takeover
  window.APEX.openBig = function () {
    if (!greeted) {
      greeted = true;
      addMessage("Trainer mode, sir. Tell me what you ate and I'll estimate it, log your water, or program your session — let's get you fit.", "apex");
    }
    render();   // refresh the dashboard from the latest profile/nutrition data every open
    big.open();
    if (window.APEX.applyBigSplit) window.APEX.applyBigSplit();   // restore saved iPhone split
    setTimeout(() => input.focus(), 700);
  };
})();


/* ============================================================================
   [JS:SLASH]  —  the "/" command palette. Type "/" to see commands; it filters
   as you type. ↑/↓ to move, Enter/click to run, Esc to dismiss.
   ============================================================================ */
(function () {
  const input = document.getElementById("chat-input");
  const palette = document.getElementById("cmd-palette");
  const messages = document.getElementById("messages");

  const COMMANDS = [
    { key: "/big", desc: "Workout APEX — food & training", run: () => window.APEX.openBig() },
    { key: "/open sim", desc: "Open the Simulations lab", run: () => window.APEX.openSim() },
    { key: "/help", desc: "Show available commands", run: showHelp },
  ];
  let matches = [], sel = 0;

  function showHelp() {
    const div = document.createElement("div");
    div.className = "msg apex";
    div.textContent = "Commands, sir — " + COMMANDS.map((c) => c.key).join("  ·  ");
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function render() {
    palette.innerHTML = `<div class="cmd-hint">Commands</div>` + matches.map((c, i) =>
      `<div class="cmd-item ${i === sel ? "active" : ""}" data-i="${i}">
         <span class="cmd-key">${c.key}</span><span class="cmd-desc">${c.desc}</span></div>`).join("");
    palette.classList.add("open");
    palette.querySelectorAll(".cmd-item").forEach((el) =>
      el.addEventListener("mousedown", (e) => { e.preventDefault(); choose(+el.dataset.i); }));
  }
  function refresh() {
    const v = input.value;
    if (!v.startsWith("/")) return closePalette();
    const q = v.slice(1).toLowerCase();
    matches = COMMANDS.filter((c) => c.key.slice(1).toLowerCase().startsWith(q) || c.key.toLowerCase().includes(v.toLowerCase()));
    if (!matches.length) return closePalette();
    if (sel >= matches.length) sel = matches.length - 1;
    render();
  }
  function closePalette() { palette.classList.remove("open"); palette.innerHTML = ""; matches = []; sel = 0; }
  function choose(i) { const c = matches[i]; if (!c) return; input.value = ""; closePalette(); c.run(); }

  input.addEventListener("input", refresh);
  // capture phase so we can intercept Enter before [JS:CHAT]'s send handler
  input.addEventListener("keydown", (e) => {
    if (!palette.classList.contains("open")) return;
    if (e.key === "ArrowDown") { e.preventDefault(); sel = (sel + 1) % matches.length; render(); }
    else if (e.key === "ArrowUp") { e.preventDefault(); sel = (sel - 1 + matches.length) % matches.length; render(); }
    else if (e.key === "Enter") { e.preventDefault(); e.stopImmediatePropagation(); choose(sel); }
    else if (e.key === "Escape") { e.preventDefault(); closePalette(); }
  }, true);
  document.addEventListener("click", (e) => { if (!palette.contains(e.target) && e.target !== input) closePalette(); });
})();


/* ============================================================================
   [JS:RESIZE]  —  iPhone-only draggable top/bottom split.
   Each grab bar resizes the TOP section (nav bar, or the /big panels) vs the chat
   below it. To avoid accidental nudges you must PRESS-AND-HOLD the bar ~1s to arm
   it (it turns RED), then drag; on release the split is saved to localStorage.
   Only active on narrow (phone) layouts; on wider screens the bars are hidden and
   any saved inline sizing is cleared so the normal layout is untouched.
   ============================================================================ */
(function () {
  const HOLD_MS = 1000;

  function makeResizer({ topEl, handleEl, storageKey, mq, minPx = 46, maxFrac = 0.72 }) {
    if (!topEl || !handleEl) return;
    const media = window.matchMedia(mq);
    const container = () => topEl.parentElement;
    let holdTimer = null, armed = false, dragged = false, startY = 0, lastUp = 0;

    function setHeight(px) {
      const box = container().getBoundingClientRect();
      if (box.height < 1) return;
      const clamped = Math.max(minPx, Math.min(box.height * maxFrac, px));
      topEl.style.flex = "0 0 auto";
      topEl.style.maxHeight = "none";
      topEl.style.height = clamped + "px";
    }
    function clearInline() {
      topEl.style.flex = ""; topEl.style.maxHeight = ""; topEl.style.height = "";
    }
    function applyStored() {
      if (!media.matches) { clearInline(); return; }     // wide screen -> normal layout
      const box = container().getBoundingClientRect();
      if (box.height < 1) return;                          // container hidden (e.g. /big closed)
      const frac = parseFloat(localStorage.getItem(storageKey));
      if (isFinite(frac)) setHeight(frac * box.height);
    }
    function save() {
      const box = container().getBoundingClientRect();
      if (box.height < 1) return;
      const h = topEl.getBoundingClientRect().height;
      try { localStorage.setItem(storageKey, (h / box.height).toFixed(4)); } catch (e) {}
    }
    // ARM the bar two ways (whichever feels natural): press-and-HOLD ~1s, OR DOUBLE-TAP it.
    // Armed = red. Then drag to resize; release saves. A tap while armed toggles it back off.
    handleEl.addEventListener("pointerdown", (e) => {
      if (!media.matches) return;
      e.preventDefault();
      try { handleEl.setPointerCapture(e.pointerId); } catch (e2) {}
      startY = e.clientY;
      dragged = false;
      if (armed) return;                        // already armed (via double-tap) -> ready to drag
      handleEl.classList.add("holding");
      clearTimeout(holdTimer);
      holdTimer = setTimeout(() => {            // held ~1s -> ARM (turn red)
        armed = true; handleEl.classList.remove("holding"); handleEl.classList.add("armed");
      }, HOLD_MS);
    });
    handleEl.addEventListener("pointermove", (e) => {
      if (!media.matches || !armed) return;     // nothing until it's ARMED (red)
      // NOTE: we deliberately do NOT cancel on small movement — a real finger always jitters
      // while holding still, and cancelling on that made it impossible to arm.
      e.preventDefault();
      dragged = true;
      setHeight(e.clientY - container().getBoundingClientRect().top);
    });
    function end() {
      clearTimeout(holdTimer);
      handleEl.classList.remove("holding");
      if (armed) {                              // release while armed
        if (dragged) save();                    // dragged -> save the new split
        armed = false; dragged = false;
        handleEl.classList.remove("armed");
        return;
      }
      // quick tap while not armed -> a second tap within 350ms ARMS it (double-tap)
      const now = Date.now();
      if (now - lastUp < 350) { armed = true; handleEl.classList.add("armed"); lastUp = 0; }
      else lastUp = now;
    }
    handleEl.addEventListener("pointerup", end);
    handleEl.addEventListener("pointercancel", end);

    window.addEventListener("resize", applyStored);
    return { applyStored };
  }

  const mainR = makeResizer({
    topEl: document.getElementById("sidebar-left"),
    handleEl: document.getElementById("grab-main"),
    storageKey: "apex.split.main",
    mq: "(max-width: 600px)",
  });
  const bigR = makeResizer({
    topEl: document.getElementById("big-panels"),
    handleEl: document.getElementById("grab-big"),
    storageKey: "apex.split.big",
    mq: "(max-width: 720px)",
  });

  mainR && mainR.applyStored();
  // /big is hidden at load (0-height container); re-apply its saved split once it opens
  window.APEX = window.APEX || {};
  window.APEX.applyBigSplit = () => bigR && setTimeout(bigR.applyStored, 60);
})();
</script>
