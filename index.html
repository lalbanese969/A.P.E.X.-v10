<!DOCTYPE html>
<!--
================================================================================
  A.P.E.X. v10  —  INTERFACE
================================================================================
  HOW THIS FILE IS ORGANIZED (search the labels in [BRACKETS] to jump around):

  [STYLE] ............ All CSS lives in the <style> block in <head>.
    [STYLE:THEME] .... Color/size variables. CHANGE COLORS & SIZES HERE FIRST.
    [STYLE:GLOBAL] ... Resets, body, background.
    [STYLE:HEADER] ... Top header bar ("A.P.E.X. v10").
    [STYLE:LAYOUT] ... The 3-column row (left sidebar | chat | right sidebar).
    [STYLE:LEFT] ..... Left sidebar (nav: New Chat, Calendar, Email, etc).
    [STYLE:CHAT] ..... Center chat panel + honeycomb canvas + messages + input.
    [STYLE:RIGHT] .... Right sidebar (Tasks).
    [STYLE:GLOW] ..... Reusable glowing-border effect.

  [HTML] ............. The page markup, mirrors the style sections above.
    [HTML:HEADER]
    [HTML:LEFT]
    [HTML:CHAT]
    [HTML:RIGHT]

  [JS] ............... All JavaScript at the bottom.
    [JS:HONEYCOMB] ... The animated honeycomb background (moving light-form streaks).
    [JS:CHAT] ........ Sending messages (local echo for now, no AI yet).
================================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<!-- viewport-fit=cover fills the notch/safe areas; locking zoom keeps it feeling like a native app,
     not a scrollable web page (prevents pinch-zoom + double-tap zoom on iPad/iPhone). -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<!-- "Add to Home Screen" on iPad/iPhone then launches A.P.E.X. FULLSCREEN (standalone), with no
     Safari toolbars and no page rubber-banding — it behaves like your own installed app. -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="A.P.E.X." />
<meta name="theme-color" content="#0a0a0b" />
<title>A.P.E.X. v10</title>

<style>
/* ============================================================================
   [STYLE:THEME]  —  EDIT COLORS & SIZES HERE FIRST
   Change a value here and it updates everywhere it's used.
   ============================================================================ */
:root {
  /* --- Colors --- */
  --color-black:        #0a0a0b;   /* main background */
  --color-panel:        #0b0b0d;   /* sidebar panel background */
  --color-orange:       #ff7a00;   /* main accent orange */
  --color-orange-soft:  #ffa64d;   /* lighter orange (text highlights) */
  --color-text:         #ececec;   /* off-white body text */
  --color-text-dim:     #7c7c82;   /* dim/secondary text */
  --color-icon:         #6b6b72;   /* unified MUTED color for nav icons/labels */

  /* --- Structural lines (these connect the panels) --- */
  --line:               rgba(255, 122, 0, 0.20);   /* glowing orange divider lines */
  --line-soft:          rgba(255, 255, 255, 0.06); /* subtle internal dividers */

  /* --- Glow (used sparingly now — no more per-box glow) --- */
  --glow-orange:        rgba(255, 122, 0, 0.45);

  /* --- Sizes (CHANGE SIDEBAR WIDTHS HERE) --- */
  --sidebar-left-width:  232px;
  --sidebar-right-width: 232px;
  --header-height:       56px;
  --radius:              12px;     /* corner roundness on small elements only */
}

/* ============================================================================
   [STYLE:GLOBAL]  —  resets + page background
   ============================================================================ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
  /* stop iPad/iPhone Safari from rubber-band scrolling / pull-to-refreshing the whole page */
  overscroll-behavior: none;
}

body {
  /* PIN the page to the viewport so the app itself never scrolls — only the inner
     areas (messages, panels) do. This is what makes it feel stationary on iPad. */
  position: fixed;
  inset: 0;
  /* respect the notch / home-indicator safe areas when launched fullscreen */
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  background: var(--color-black);
  color: var(--color-text);
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden; /* the panels scroll internally, not the whole page */
  display: flex;
  flex-direction: column;
}

/* The only things allowed to scroll are the app's own scroll regions — and their
   scrolling must NOT chain up to the page (overscroll-behavior: contain). */
#messages,
.center-view,
.big-panels,
.big-tabbody,
#big-messages {
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;   /* momentum scrolling on iOS */
}

/* ============================================================================
   [STYLE:GLOW]  —  deprecated utility (kept harmless; the redesign uses thin
   connecting LINES instead of per-box glow, which is what smudged the corners).
   ============================================================================ */
.glow { }

/* ============================================================================
   [STYLE:HEADER]  —  top header bar (full-width glowing line underneath)
   ============================================================================ */
#header {
  height: var(--header-height);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 0 20px;
  background: var(--color-panel);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 6px 26px -14px var(--glow-orange); /* soft downward glow, no corners */
  position: relative;
  z-index: 10;
}

/* hexagon brand mark — ties the wordmark to the honeycomb background */
#header .brand-mark {
  width: 20px;
  height: 20px;
  color: var(--color-orange);
  filter: drop-shadow(0 0 5px var(--glow-orange));
}
#header .logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--color-text);
}
#header .logo .accent { color: var(--color-orange); }
#header .ver {
  margin-left: 2px;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--color-orange);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 2px 7px;
}

/* ============================================================================
   [STYLE:LAYOUT]  —  the 3-column row, FULL-BLEED and CONNECTED (no gaps).
   Sidebars are joined to the chat by glowing divider lines (set on each
   sidebar's inner edge) that run full height and meet the header line.
   ============================================================================ */
#main {
  flex: 1;
  display: flex;
  min-height: 0; /* lets children scroll instead of overflowing */
}

.panel {
  background: var(--color-panel);
  overflow: hidden;
}

/* ============================================================================
   [STYLE:LEFT]  —  left sidebar (navigation)
   ============================================================================ */
#sidebar-left {
  width: var(--sidebar-left-width);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 16px 12px;
  border-right: 1px solid var(--line);   /* the line that touches the chat */
}

/* "+ New Chat" button */
.new-chat-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px;
  border-radius: 10px;
  background: rgba(255, 122, 0, 0.12);
  border: 1px solid var(--line);
  color: var(--color-orange);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: background 0.15s;
}
.new-chat-btn:hover { background: rgba(255, 122, 0, 0.22); }

/* small uppercase section label (e.g. NAVIGATION) */
.nav-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--color-text-dim);
  margin: 20px 6px 8px;
}

/* Nav items — unified MONOCHROME line icons, orange only when active/hover */
.nav-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.nav-item {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 12px;
  border-radius: 8px;
  color: var(--color-icon);
  font-size: 13.5px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.nav-item .icon {
  width: 17px;
  height: 17px;
  flex-shrink: 0;
  display: flex;
}
.nav-item .icon svg { width: 100%; height: 100%; }
.nav-item:hover { background: rgba(255, 255, 255, 0.04); color: var(--color-text); }
.nav-item.active { color: var(--color-orange); background: rgba(255, 122, 0, 0.10); }
/* little left accent bar on the active item */
.nav-item.active::before {
  content: "";
  position: absolute;
  left: 0; top: 7px; bottom: 7px;
  width: 2px;
  border-radius: 2px;
  background: var(--color-orange);
  box-shadow: 0 0 6px var(--glow-orange);
}

/* ============================================================================
   [STYLE:CHAT]  —  center chat panel
   Structure: #chat (frame)
                ├─ #honeycomb   (animated canvas background)
                ├─ #messages    (scrolling message list, sits ABOVE canvas)
                └─ #input-bar    (text box + send button)
   ============================================================================ */
#chat {
  flex: 1;            /* takes all space between the two sidebars */
  min-width: 0;
  position: relative; /* anchor for the absolutely-positioned canvas */
  display: flex;
  flex-direction: column;
  background: #000;   /* pure black so the hidden honeycomb stays invisible */
}

/* The honeycomb canvas — fills the whole chat panel, sits behind everything */
#honeycomb {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none; /* clicks pass through to the chat */
}

/* Scrolling list of messages (above the canvas) */
#messages {
  position: relative;
  z-index: 1;
  flex: 1;
  overflow-y: auto;
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* A single message bubble — asymmetric "tail" corners for a chat-app feel */
.msg {
  max-width: 74%;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-wrap: break-word;
}
/* Message from the USER (right side, soft orange) */
.msg.user {
  align-self: flex-end;
  background: rgba(255, 122, 0, 0.16);
  border: 1px solid rgba(255, 122, 0, 0.32);
  color: var(--color-text);
  border-radius: 16px 16px 4px 16px;
}
/* Message from APEX (left side, dark) */
.msg.apex {
  align-self: flex-start;
  background: rgba(255, 255, 255, 0.045);
  border: 1px solid var(--line-soft);
  color: var(--color-text);
  border-radius: 16px 16px 16px 4px;
}

/* Input bar — MINIMAL: floats over the honeycomb, a pill + round arrow button */
#input-bar {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px 18px;
  background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0));
}
#input-bar input {
  flex: 1;
  padding: 12px 18px;
  border-radius: 22px;
  border: 1px solid var(--line-soft);
  background: rgba(22, 22, 25, 0.85);
  color: var(--color-text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#input-bar input:focus {
  border-color: rgba(255, 122, 0, 0.5);
  box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.08);
}
#input-bar input::placeholder { color: var(--color-text-dim); }

/* round send button with an up-arrow icon (no "Send" text) */
#input-bar .send-btn {
  width: 38px;
  height: 38px;
  flex-shrink: 0;
  border-radius: 50%;
  border: none;
  background: var(--color-orange);
  color: #160b00;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: filter 0.15s, box-shadow 0.15s;
}
#input-bar .send-btn svg { width: 18px; height: 18px; }
#input-bar .send-btn:hover { filter: brightness(1.12); box-shadow: 0 0 12px var(--glow-orange); }

/* ============================================================================
   [STYLE:RIGHT]  —  right sidebar (Tasks)
   ============================================================================ */
#sidebar-right {
  width: var(--sidebar-right-width);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 16px 14px;
  border-left: 1px solid var(--line);    /* the line that touches the chat */
}
#sidebar-right .panel-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--color-text-dim);
}

/* A single task row */
.task-list {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.task-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 9px;
  background: rgba(255, 255, 255, 0.025);
  border: 1px solid var(--line-soft);
  font-size: 13px;
  color: var(--color-text);
}
.task-item .checkbox {
  width: 15px;
  height: 15px;
  border-radius: 4px;
  border: 1px solid var(--color-icon);
  flex-shrink: 0;
}
.task-empty { font-size: 12px; color: var(--color-text-dim); padding: 4px 2px; }

/* ============================================================================
   [STYLE:VIEWS]  —  center view switcher (chat / calendar / email) + draft card
   The center panel can show one of three views. Calendar/Email sit above the
   honeycomb just like the messages do.
   ============================================================================ */
.center-view {
  position: relative;
  z-index: 1;
  flex: 1;
  overflow-y: auto;
  padding: 22px;
  display: none;            /* hidden until [JS:VIEWS] shows it */
  flex-direction: column;
  gap: 12px;
  /* dark backdrop so the honeycomb doesn't bleed through these text-dense pages
     (the chat view is NOT a .center-view, so it keeps the full honeycomb) */
  background: rgba(9, 9, 11, 0.92);
}
.center-view .view-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--color-text-dim);
  padding-bottom: 12px;
  margin-bottom: 6px;
  border-bottom: 1px solid var(--line-soft);
}

/* a single calendar event row */
.event-card {
  border: 1px solid rgba(255, 122, 0, 0.3);
  border-left: 3px solid var(--color-orange);
  border-radius: 10px;
  padding: 10px 14px;
  background: rgba(255, 255, 255, 0.03);
}
.event-card .ev-title { font-weight: 600; color: var(--color-text); }
.event-card .ev-time  { font-size: 12px; color: var(--color-orange-soft); margin-top: 2px; }
.event-card .ev-loc   { font-size: 12px; color: var(--color-text-dim); margin-top: 2px; }
.day-heading { font-size: 12px; color: var(--color-text-dim); margin: 10px 0 2px; text-transform: uppercase; letter-spacing: 1px; }

/* email rows */
.email-card {
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  padding: 10px 14px;
  background: rgba(255, 255, 255, 0.03);
}
.email-card.unread { border-color: rgba(255, 122, 0, 0.5); }
.email-card .em-from { font-weight: 600; font-size: 13px; }
.email-card .em-subj { color: var(--color-orange-soft); font-size: 13px; margin-top: 2px; }
.email-card .em-snip { color: var(--color-text-dim); font-size: 12px; margin-top: 3px; }
.email-accounts { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.acct-chip {
  font-size: 12px; padding: 5px 10px; border-radius: 999px;
  border: 1px solid rgba(255, 122, 0, 0.4); color: var(--color-orange-soft);
  background: rgba(255, 122, 0, 0.08); cursor: pointer;
}
.acct-chip.active { background: rgba(255, 122, 0, 0.22); color: var(--color-orange); }

/* APEX draft card (rendered inside chat) */
.draft-card {
  align-self: stretch;
  border: 1px solid var(--color-orange);
  border-radius: 12px;
  background: rgba(255, 122, 0, 0.08);
  padding: 12px 14px;
  box-shadow: 0 0 10px var(--glow-orange);
}
.draft-card .dc-head { font-size: 12px; color: var(--color-orange); font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
.draft-card label { display: block; font-size: 11px; color: var(--color-text-dim); margin-top: 6px; }
.draft-card input, .draft-card textarea {
  width: 100%; margin-top: 2px; padding: 8px 10px; border-radius: 8px;
  border: 1px solid rgba(255, 122, 0, 0.4); background: rgba(15, 15, 15, 0.9);
  color: var(--color-text); font-size: 13px; font-family: inherit; outline: none;
}
.draft-card textarea { min-height: 130px; resize: vertical; white-space: pre-wrap; }
.draft-card .dc-actions { margin-top: 10px; display: flex; gap: 8px; }
.draft-card button {
  padding: 7px 14px; border-radius: 8px; border: 1px solid var(--color-orange);
  background: rgba(255, 122, 0, 0.18); color: var(--color-orange); font-size: 13px;
  font-weight: 600; cursor: pointer;
}
.draft-card button:hover { background: rgba(255, 122, 0, 0.3); }
.draft-card .dc-hint { font-size: 11px; color: var(--color-text-dim); margin-top: 8px; }

/* nav active state */
.nav-item.active { background: rgba(255, 122, 0, 0.14); border-color: rgba(255, 122, 0, 0.6); color: var(--color-orange); }

/* settings page */
.set-section {
  border: 1px solid rgba(255, 122, 0, 0.25);
  border-radius: 12px;
  padding: 14px 16px;
  background: rgba(255, 255, 255, 0.02);
  margin-bottom: 14px;
}
.set-section h3 {
  font-size: 13px; letter-spacing: 1px; color: var(--color-orange);
  margin-bottom: 10px; text-transform: uppercase;
}
.set-row { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
.set-row label { font-size: 11px; color: var(--color-text-dim); }
.set-row input, .set-row select {
  padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255, 122, 0, 0.4);
  background: rgba(15, 15, 15, 0.9); color: var(--color-text); font-size: 13px;
  font-family: inherit; outline: none;
}
.set-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.set-note { font-size: 11px; color: var(--color-text-dim); margin-top: 4px; }
.set-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
.set-badge.ok  { background: rgba(68, 208, 122, 0.18); color: #44d07a; }
.set-badge.off { background: rgba(208, 68, 68, 0.18); color: #ff7a7a; }
.set-save {
  padding: 9px 18px; border-radius: 9px; border: 1px solid var(--color-orange);
  background: rgba(255, 122, 0, 0.2); color: var(--color-orange); font-weight: 600;
  font-size: 14px; cursor: pointer;
}
.set-save:hover { background: rgba(255, 122, 0, 0.32); box-shadow: 0 0 10px var(--glow-orange); }
.acct-block { border: 1px solid rgba(255, 122, 0, 0.2); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; }
.acct-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.acct-type { font-weight: 600; font-size: 13px; color: var(--color-orange-soft); }
.acct-addr { font-size: 12px; color: var(--color-text-dim); flex: 1; }
.acct-remove { background: none; border: 1px solid rgba(208,68,68,0.5); color: #ff7a7a; border-radius: 6px; cursor: pointer; width: 24px; height: 24px; }
.acct-remove:hover { background: rgba(208,68,68,0.15); }
.acct-connect { margin-top: 8px; padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,122,0,0.45); background: rgba(255,122,0,0.1); color: var(--color-orange-soft); font-size: 12px; cursor: pointer; }
.acct-connect:hover { background: rgba(255,122,0,0.2); }
.add-acct { border-top: 1px solid rgba(255,122,0,0.2); padding-top: 6px; margin-top: 6px; }

/* status strip (bottom of left sidebar) */
#status-strip { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--line-soft); font-size: 11px; color: var(--color-text-dim); }
#status-strip .st-row { display: flex; align-items: center; gap: 7px; margin-top: 6px; }
.st-dot { width: 7px; height: 7px; border-radius: 50%; background: #4a4a4f; flex-shrink: 0; }
.st-dot.ok  { background: #44d07a; box-shadow: 0 0 6px #44d07a; }
.st-dot.off { background: #d04444; }

/* ============================================================================
   [STYLE:CALENDAR-VIEW]  —  Google-Calendar-style month grid
   ============================================================================ */
#calendar-view { padding: 18px 22px; gap: 0; }
.cal-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.cal-title { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; color: var(--color-text); }
.cal-nav-btn {
  width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--line-soft);
  background: transparent; color: var(--color-text-dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 17px; line-height: 1;
}
.cal-nav-btn:hover { background: rgba(255, 255, 255, 0.05); color: var(--color-text); }
.cal-today-btn {
  margin-left: auto; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--line);
  background: transparent; color: var(--color-orange); font-size: 12px; font-weight: 600; cursor: pointer;
}
.cal-today-btn:hover { background: rgba(255, 122, 0, 0.12); }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-weekdays div {
  font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--color-text-dim); padding: 6px 8px;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 1fr;
  border-left: 1px solid var(--line-soft); border-top: 1px solid var(--line-soft);
  border-radius: 10px; overflow: hidden; flex: 1; min-height: 0;
}
.cal-cell {
  border-right: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft);
  padding: 5px 6px; min-height: 80px; display: flex; flex-direction: column; gap: 3px; overflow: hidden;
}
.cal-cell.dim { background: rgba(255, 255, 255, 0.012); }
.cal-cell .daynum { font-size: 12px; color: var(--color-text-dim); line-height: 1.6; align-self: flex-start; }
.cal-cell.dim .daynum { opacity: 0.4; }
.cal-cell.today .daynum {
  background: var(--color-orange); color: #160b00; font-weight: 700;
  width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
}
.cal-event {
  font-size: 11px; line-height: 1.35; color: #fff; padding: 2px 6px; border-radius: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cal-more { font-size: 10px; color: var(--color-text-dim); padding-left: 4px; }

/* Week/Month toggle + body wrapper */
.cal-modes { display: flex; gap: 4px; }
.cal-mode-btn { padding: 6px 12px; border-radius: 7px; border: 1px solid var(--line-soft); background: transparent; color: var(--color-text-dim); font-size: 12px; cursor: pointer; }
.cal-mode-btn:hover { color: var(--color-text); }
.cal-mode-btn.active { background: rgba(255, 122, 0, 0.12); border-color: var(--line); color: var(--color-orange); }
#cal-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }

/* ----- WEEK view (Google-style time grid, Sun → Sat) ----- */
.week-head { display: grid; grid-template-columns: 56px 1fr; flex-shrink: 0; }
.week-head .wh-days { display: grid; grid-template-columns: repeat(7, 1fr); }
.week-day-head { text-align: center; padding: 6px 4px 8px; border-left: 1px solid var(--line-soft); }
.week-day-head .wd-name { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--color-text-dim); }
.week-day-head .wd-num { font-size: 18px; color: var(--color-text); margin-top: 3px; line-height: 1; }
.week-day-head.today .wd-num { background: var(--color-orange); color: #160b00; font-weight: 700; width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
.week-body { flex: 1; min-height: 0; overflow-y: auto; display: grid; grid-template-columns: 56px 1fr; border-top: 1px solid var(--line-soft); }
.week-hour-label { height: 44px; font-size: 10px; color: var(--color-text-dim); text-align: right; padding-right: 6px; transform: translateY(-6px); }
.week-cols { display: grid; grid-template-columns: repeat(7, 1fr); }
.week-col {
  position: relative; border-left: 1px solid var(--line-soft);
  background: repeating-linear-gradient(to bottom, transparent 0, transparent 43px, var(--line-soft) 43px, var(--line-soft) 44px);
}
.week-event { position: absolute; left: 2px; right: 2px; border-radius: 4px; color: #fff; font-size: 10px; line-height: 1.2; padding: 2px 5px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.35); cursor: pointer; }
.week-event .we-time { opacity: 0.85; font-size: 9px; }
.cal-event { cursor: pointer; }

/* ----- event detail popover (click an event, like Google Calendar) ----- */
#event-pop-backdrop { position: fixed; inset: 0; z-index: 40; }
#event-pop {
  position: fixed; z-index: 41; width: 290px; background: #161618;
  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;
  box-shadow: 0 14px 44px rgba(0, 0, 0, 0.6);
}
#event-pop .ep-bar { height: 6px; }
#event-pop .ep-body { padding: 14px 16px 16px; position: relative; }
#event-pop .ep-close { position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; border: none; background: none; color: var(--color-text-dim); font-size: 18px; line-height: 1; cursor: pointer; border-radius: 6px; }
#event-pop .ep-close:hover { background: rgba(255, 255, 255, 0.06); color: var(--color-text); }
#event-pop .ep-title { font-size: 16px; font-weight: 600; color: var(--color-text); margin: 2px 30px 12px 0; }
#event-pop .ep-row { display: flex; gap: 9px; align-items: flex-start; font-size: 13px; color: var(--color-text-dim); margin-bottom: 8px; }
#event-pop .ep-row .ep-ic { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.7; margin-top: 1px; }
#event-pop .ep-dot { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }
#event-pop .ep-actions { margin-top: 12px; border-top: 1px solid var(--line-soft); padding-top: 12px; }
#event-pop .ep-del { font-size: 12px; color: #ff8a8a; background: none; border: 1px solid rgba(208, 68, 68, 0.4); border-radius: 7px; padding: 6px 13px; cursor: pointer; }
#event-pop .ep-del:hover { background: rgba(208, 68, 68, 0.12); }

/* ============================================================================
   [STYLE:LOGS-VIEW]  —  backend-call logs + scheduled timers (mock)
   ============================================================================ */
.logs-section-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-text-dim); margin: 14px 0 8px; }
.logs-section-title:first-child { margin-top: 0; }
.logs-note { font-size: 11px; color: var(--color-text-dim); margin-bottom: 10px; }
.log-row { display: flex; gap: 12px; align-items: flex-start; padding: 10px 12px; border: 1px solid var(--line-soft); border-radius: 9px; background: rgba(255, 255, 255, 0.02); margin-bottom: 7px; }
.log-row .log-time { font-size: 11px; color: var(--color-text-dim); white-space: nowrap; min-width: 96px; padding-top: 2px; }
.log-row .log-body { flex: 1; min-width: 0; }
.log-row .log-action { font-size: 13px; color: var(--color-text); font-weight: 600; }
.log-row .log-detail { font-size: 12px; color: var(--color-text-dim); margin-top: 2px; }
.log-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.log-src { font-size: 10px; padding: 2px 7px; border-radius: 999px; background: rgba(255, 255, 255, 0.06); color: var(--color-text-dim); }
.log-status { font-size: 10px; padding: 2px 7px; border-radius: 999px; }
.log-status.ok { background: rgba(68, 208, 122, 0.15); color: #5cd98a; }
.log-status.skipped { background: rgba(246, 191, 38, 0.15); color: #f6bf26; }
.log-status.error { background: rgba(208, 68, 68, 0.18); color: #ff7a7a; }
.timer-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border: 1px solid var(--line-soft); border-radius: 9px; background: rgba(255, 255, 255, 0.02); margin-bottom: 7px; }
.timer-name { font-size: 13px; font-weight: 600; color: var(--color-text); }
.timer-sched { font-size: 11px; color: var(--color-text-dim); margin-top: 2px; }
.timer-toggle {
  font-size: 10px; padding: 3px 10px; border-radius: 999px; border: none; cursor: pointer;
  font-family: inherit; letter-spacing: 0.5px;
}
.timer-toggle.on { background: rgba(68, 208, 122, 0.15); color: #5cd98a; }
.timer-toggle.off { background: rgba(255, 255, 255, 0.06); color: var(--color-text-dim); }
.timer-actions { display: flex; gap: 6px; margin-left: auto; align-items: center; }
.timer-del {
  width: 24px; height: 24px; border-radius: 6px; border: 1px solid rgba(208, 68, 68, 0.4);
  background: none; color: #ff8a8a; cursor: pointer; font-size: 13px; line-height: 1;
}
.timer-del:hover { background: rgba(208, 68, 68, 0.12); }
.add-timer { border-top: 1px solid var(--line-soft); padding-top: 10px; margin-top: 4px; }
.add-timer-grid { display: grid; grid-template-columns: 1.3fr 1fr 0.9fr 0.9fr auto; gap: 8px; align-items: end; }
.add-timer label { display: block; font-size: 10px; color: var(--color-text-dim); margin-bottom: 3px; }
.add-timer input, .add-timer select {
  width: 100%; padding: 7px 9px; border-radius: 7px; border: 1px solid var(--line-soft);
  background: rgba(15, 15, 17, 0.9); color: var(--color-text); font-size: 12px; outline: none; font-family: inherit;
}
.add-timer-btn {
  padding: 7px 14px; border-radius: 7px; border: 1px solid var(--line); background: rgba(255, 122, 0, 0.14);
  color: var(--color-orange); font-size: 12px; font-weight: 600; cursor: pointer;
}
.add-timer-btn:hover { background: rgba(255, 122, 0, 0.24); }
.automation-warn {
  font-size: 11px; color: var(--color-orange-soft); background: rgba(255, 122, 0, 0.07);
  border: 1px solid var(--line); border-radius: 8px; padding: 8px 11px; margin-bottom: 12px;
}

/* ============================================================================
   [STYLE:COLOR-CATEGORIES]  —  Google-color -> category rows in Settings
   ============================================================================ */
.colorcat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.colorcat-swatch { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
.colorcat-name { font-size: 12px; width: 76px; flex-shrink: 0; color: var(--color-text); }
.colorcat-row .cat-input { flex: 1; padding: 7px 10px; border-radius: 7px; border: 1px solid var(--line-soft); background: rgba(15, 15, 17, 0.9); color: var(--color-text); font-size: 12px; outline: none; }
.colorcat-row .def-pick { font-size: 10px; color: var(--color-text-dim); display: flex; align-items: center; gap: 3px; cursor: pointer; flex-shrink: 0; }

/* ============================================================================
   [STYLE:SLASH]  —  the "/" command palette that pops above the input
   ============================================================================ */
#cmd-palette {
  position: absolute; left: 18px; right: 18px; bottom: calc(100% - 4px);
  background: #141416; border: 1px solid var(--line); border-radius: 12px;
  overflow: hidden; box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.5); display: none; z-index: 6;
}
#cmd-palette.open { display: block; }
#cmd-palette .cmd-hint { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--color-text-dim); padding: 8px 14px 4px; }
.cmd-item { display: flex; align-items: baseline; gap: 12px; padding: 9px 14px; cursor: pointer; }
.cmd-item + .cmd-item { border-top: 1px solid var(--line-soft); }
.cmd-item.active { background: rgba(255, 122, 0, 0.12); }
.cmd-item .cmd-key { font-size: 13px; color: var(--color-orange); font-weight: 600; min-width: 96px; }
.cmd-item .cmd-desc { font-size: 12px; color: var(--color-text-dim); }

/* ============================================================================
   [STYLE:SIM]  —  fullscreen simulations takeover (honeycomb reveal + iframe)
   ============================================================================ */
#sim-overlay { position: fixed; inset: 0; z-index: 300; display: none; background: transparent; }
#sim-overlay.on { display: block; }
#sim-iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: var(--color-black); opacity: 0; }
#sim-hex { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
#sim-close {
  position: absolute; top: 16px; right: 18px; z-index: 3; display: none;
  align-items: center; gap: 7px; padding: 8px 14px; border-radius: 9px;
  border: 1px solid var(--line); background: rgba(18, 18, 20, 0.82);
  color: var(--color-orange); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
}
#sim-close:hover { background: rgba(255, 122, 0, 0.16); }

/* ============================================================================
   [STYLE:BIG]  —  fullscreen "Workout APEX" takeover (/big): chat left, panels right
   ============================================================================ */
#big-overlay { position: fixed; inset: 0; z-index: 300; display: none; background: transparent; }
#big-overlay.on { display: block; }
#big-hex { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
#big-close {
  position: absolute; top: 16px; right: 18px; z-index: 3; display: none;
  align-items: center; gap: 7px; padding: 8px 14px; border-radius: 9px;
  border: 1px solid var(--line); background: rgba(18, 18, 20, 0.82);
  color: var(--color-orange); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
}
#big-close:hover { background: rgba(255, 122, 0, 0.16); }

/* the whole workout UI — fades up as the honeycomb clears (opacity driven by [JS:TAKEOVER]) */
#big-app {
  position: absolute; inset: 0; z-index: 1; opacity: 0;
  display: flex; flex-direction: column;
  background: radial-gradient(120% 90% at 50% -10%, rgba(255, 122, 0, 0.06), transparent 60%), var(--color-black);
}
.big-header { flex-shrink: 0; height: 56px; display: flex; align-items: center; gap: 12px; padding: 0 118px 0 22px; border-bottom: 1px solid var(--line); }
.big-header .big-mark { width: 20px; height: 20px; color: var(--color-orange); }
.big-header .big-logo { font-weight: 800; letter-spacing: 1px; font-size: 15px; }
.big-header .big-logo .accent { color: var(--color-orange); }
.big-chip { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--color-orange); border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px; }
.big-header .big-sub { margin-left: auto; font-size: 12px; color: var(--color-text-dim); }

.big-body { flex: 1; display: flex; min-height: 0; }

/* --- left: live APEX chat --- */
.big-chat { width: 40%; min-width: 320px; max-width: 520px; display: flex; flex-direction: column; border-right: 1px solid var(--line); }
#big-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.big-input-bar { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 12px 16px 16px; background: linear-gradient(to top, rgba(0, 0, 0, 0.6), transparent); }
.big-input-bar input { flex: 1; padding: 12px 18px; border-radius: 22px; border: 1px solid var(--line-soft); background: rgba(22, 22, 25, 0.85); color: var(--color-text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
.big-input-bar input:focus { border-color: rgba(255, 122, 0, 0.5); box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.08); }
.big-input-bar input::placeholder { color: var(--color-text-dim); }
.big-input-bar .send-btn { width: 38px; height: 38px; flex-shrink: 0; border-radius: 50%; border: none; background: var(--color-orange); color: #160b00; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: filter 0.15s; }
.big-input-bar .send-btn svg { width: 18px; height: 18px; }
.big-input-bar .send-btn:hover { filter: brightness(1.12); }

/* --- right: tabbed workout + nutrition + metrics panels --- */
.big-panels { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.big-tabs { flex-shrink: 0; display: flex; gap: 4px; padding: 14px 22px 0; border-bottom: 1px solid var(--line-soft); }
.big-tab { background: none; border: none; color: var(--color-text-dim); font-family: inherit; font-weight: 700; font-size: 12px; letter-spacing: 0.6px; text-transform: uppercase; padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; }
.big-tab.active { color: var(--color-orange); border-bottom-color: var(--color-orange); }
.big-tab:hover:not(.active) { color: var(--color-text); }
.big-tabbody { flex: 1; overflow-y: auto; padding: 20px 22px 26px; display: flex; flex-direction: column; gap: 16px; }
.bcard { background: var(--color-panel); border: 1px solid var(--line-soft); border-radius: 12px; padding: 18px; }
.bcard-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
.bcard-title { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--color-text); }
.bcard-note { font-size: 11px; color: var(--color-text-dim); }

/* macros */
.macro-row { margin-bottom: 12px; }
.macro-row:last-child { margin-bottom: 0; }
.macro-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.macro-top .ml { color: var(--color-text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; }
.macro-top .mv { color: var(--color-text); font-size: 12.5px; }
.macro-top .mv b { color: var(--color-orange); font-weight: 700; }
.macro-bar { height: 7px; border-radius: 999px; background: rgba(255, 255, 255, 0.06); overflow: hidden; }
.macro-fill { height: 100%; border-radius: 999px; background: var(--color-orange); transition: width 0.25s; }
.macro-fill.c { background: var(--color-orange-soft); }
.macro-fill.f { background: #c76a12; }

/* food log */
.food-input { display: flex; gap: 8px; margin-bottom: 12px; }
.food-input input { flex: 1; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--line-soft); background: rgba(22, 22, 25, 0.85); color: var(--color-text); font-size: 13px; font-family: inherit; outline: none; }
.food-input input:focus { border-color: rgba(255, 122, 0, 0.5); }
.food-input button { padding: 0 15px; border-radius: 8px; border: none; background: var(--color-orange); color: #160b00; font-weight: 700; font-size: 13px; cursor: pointer; }
.food-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-top: 1px solid var(--line-soft); font-size: 13px; }
.food-item:first-child { border-top: none; }
.food-item .fname { color: var(--color-text); flex: 1; }
.food-item .fkcal { color: var(--color-orange-soft); font-size: 12px; white-space: nowrap; margin-left: 10px; }
.food-x { flex-shrink: 0; margin-left: 10px; background: transparent; border: none; color: var(--color-text-dim); font-size: 17px; line-height: 1; cursor: pointer; padding: 2px 5px; border-radius: 5px; }
.food-x:hover { color: #ff6b6b; background: rgba(255, 107, 107, 0.12); }
.food-edit { flex-shrink: 0; margin-left: 8px; background: transparent; border: none; color: var(--color-text-dim); font-size: 13px; line-height: 1; cursor: pointer; padding: 3px 6px; border-radius: 5px; }
.food-edit:hover { color: var(--color-orange); background: rgba(255, 122, 0, 0.12); }
/* inline food editor */
.food-edit-row { flex-direction: column; align-items: stretch; gap: 8px; padding: 12px 0; }
.fe { background: rgba(22, 22, 25, 0.9); border: 1px solid var(--line-soft); color: var(--color-text); border-radius: 6px; padding: 7px 9px; font-family: inherit; font-size: 13px; outline: none; }
.fe:focus { border-color: rgba(255, 122, 0, 0.5); }
.fe-name { width: 100%; }
.fe-line { display: flex; gap: 6px; }
.fe-line .fe { flex: 1; min-width: 0; width: 100%; }
.fe-actions { align-items: center; gap: 8px; }
.fe-learn { flex: 1; font-size: 11px; color: var(--color-text-dim); display: flex; align-items: center; gap: 5px; cursor: pointer; }
.fe-learn input { accent-color: var(--color-orange); }
.fe-save { background: var(--color-orange); color: #160b00; border: none; font-weight: 700; padding: 7px 16px; border-radius: 7px; cursor: pointer; font-size: 13px; }
.fe-cancel { background: transparent; border: 1px solid var(--line-soft); color: var(--color-text-dim); padding: 7px 12px; border-radius: 7px; cursor: pointer; font-size: 13px; }

/* today's workout */
.wo-ex { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-top: 1px solid var(--line-soft); cursor: pointer; }
.wo-ex:first-child { border-top: none; }
.wo-check { width: 20px; height: 20px; flex-shrink: 0; border-radius: 6px; border: 1.5px solid var(--line); display: flex; align-items: center; justify-content: center; color: transparent; }
.wo-ex.done .wo-check { background: var(--color-orange); border-color: var(--color-orange); color: #160b00; }
.wo-ex.done .wo-name { color: var(--color-text-dim); text-decoration: line-through; }
.wo-name { flex: 1; font-size: 13.5px; color: var(--color-text); }
.wo-sets { font-size: 12px; color: var(--color-text-dim); }
.wo-progress { margin-top: 14px; display: flex; align-items: center; gap: 12px; }
.wo-progress .wp-bar { flex: 1; height: 7px; border-radius: 999px; background: rgba(255, 255, 255, 0.06); overflow: hidden; }
.wo-progress .wp-fill { height: 100%; background: var(--color-orange); border-radius: 999px; transition: width 0.25s; }
.wo-progress .wp-txt { font-size: 12px; color: var(--color-text-dim); white-space: nowrap; }
.wo-streak { margin-top: 12px; font-size: 12px; color: var(--color-orange-soft); }

/* water jug — an orange "juice" level you fill toward your daily limit */
.water-wrap { display: flex; align-items: center; gap: 20px; }
.jug { position: relative; width: 92px; height: 150px; flex-shrink: 0; border: 2px solid var(--line); border-radius: 10px 10px 16px 16px; overflow: hidden; background: rgba(255, 255, 255, 0.03); }
.jug-fill { position: absolute; left: 0; right: 0; bottom: 0; background: linear-gradient(to top, #ff7a00, #ffa64d); box-shadow: 0 0 18px rgba(255, 122, 0, 0.5); transition: height 0.4s cubic-bezier(.4,0,.2,1); }
.jug-goal-line { position: absolute; left: 0; right: 0; height: 0; border-top: 1px dashed rgba(255, 255, 255, 0.35); }
.jug-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--color-text); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7); }
.water-right { flex: 1; }
.water-amt { font-size: 20px; font-weight: 700; color: var(--color-text); }
.water-amt b { color: var(--color-orange); }
.water-goal { font-size: 12px; color: var(--color-text-dim); margin-bottom: 12px; }
.water-btns { display: flex; flex-wrap: wrap; gap: 7px; }
.water-btns button { padding: 7px 12px; border-radius: 8px; border: 1px solid var(--line); background: rgba(255, 122, 0, 0.10); color: var(--color-orange); font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; }
.water-btns button:hover { background: rgba(255, 122, 0, 0.20); }
.water-btns button.minus { border-color: var(--line-soft); background: rgba(255, 255, 255, 0.04); color: var(--color-text-dim); }

/* metrics (Apple Watch / Health placeholders until sync is built) */
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.metric { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--line-soft); border-radius: 10px; padding: 14px 16px; }
.metric .m-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--color-text-dim); margin-bottom: 6px; }
.metric .m-value { font-size: 22px; font-weight: 700; color: var(--color-orange); }
.metric .m-value small { font-size: 12px; color: var(--color-text-dim); font-weight: 400; margin-left: 3px; }
.watch-note { background: rgba(255, 122, 0, 0.07); border: 1px solid rgba(255, 122, 0, 0.25); border-radius: 8px; padding: 12px 14px; font-size: 12.5px; color: var(--color-text-dim); }
.watch-note b { color: var(--color-orange-soft); font-weight: 600; }
.watch-btn { margin-top: 10px; width: 100%; padding: 10px; border-radius: 8px; border: 1px dashed var(--line); background: transparent; color: var(--color-text-dim); font-family: inherit; font-size: 13px; font-weight: 600; cursor: not-allowed; }

/* nutrition dashboard visuals — calories gauge + water bottle + fiber + memory tag */
.hero-row { display: flex; gap: 18px; align-items: stretch; }
.hero-cal { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 9px; }
.cal-big { font-size: 30px; font-weight: 800; color: var(--color-text); line-height: 1; }
.cal-big b { color: var(--color-orange); }
.cal-big span { font-size: 15px; color: var(--color-text-dim); font-weight: 600; margin-left: 6px; }
.macro-bar.big { height: 12px; }
.bottle-wrap { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.bottle { position: relative; width: 66px; height: 132px; border: 2px solid var(--line); border-radius: 9px 9px 22px 22px; overflow: hidden; background: rgba(255, 255, 255, 0.03); margin-top: 8px; }
.bottle-cap { position: absolute; top: -9px; left: 50%; transform: translateX(-50%); width: 26px; height: 10px; border-radius: 4px 4px 0 0; background: var(--color-orange); box-shadow: 0 0 8px rgba(255, 122, 0, 0.6); }
.bottle-fill { position: absolute; left: 0; right: 0; bottom: 0; background: linear-gradient(to top, #ff7a00, #ffb257); box-shadow: 0 0 16px rgba(255, 122, 0, 0.5); transition: height 0.5s cubic-bezier(.4, 0, .2, 1); }
.bottle-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: var(--color-text); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.75); }
.bottle-pct small { font-size: 10px; margin-left: 1px; }
.macro-fill.fb { background: #8a5a12; }
.mem-tag { font-size: 10px; color: var(--color-orange-soft); border: 1px solid var(--line); border-radius: 999px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; }
.reset-day-btn { background: transparent; border: 1px solid var(--line-soft); color: var(--color-text-dim); font-family: inherit; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-top: 12px; }
.reset-day-btn:hover { color: var(--color-orange); border-color: var(--line); }
@media (max-width: 760px) { .hero-row { flex-direction: column; align-items: center; } .hero-cal { width: 100%; } }

/* --- responsive: iPad = side-by-side; iPhone (narrow) = stacked, content on TOP, chat at BOTTOM --- */
@media (max-width: 720px) {
  .big-body { flex-direction: column; }
  /* order puts panels on top (1), the drag divider (2), then chat at the bottom (3) */
  .big-panels { order: 1; flex: 0 0 46%; min-height: 0; }   /* top ~46% by default; draggable */
  #grab-big { display: flex; order: 2; }
  .big-chat { width: auto; max-width: none; border-right: none; border-top: none; order: 3; flex: 1 1 0; min-height: 0; }
  .big-header { padding: 0 96px 0 16px; }
  .big-tabbody { padding: 16px; }
  .metric-grid { grid-template-columns: 1fr 1fr; }
}

/* ============================================================================
   [STYLE:GRAB]  —  the draggable top/bottom divider on iPhone. It's a brighter,
   thicker separator you can RESIZE, but only after a press-and-hold (~1s) arms it
   — armed it turns RED — so you never nudge it by accident. Hidden on wide screens.
   ============================================================================ */
.vgrab {
  display: none;                 /* only shown inside the phone media queries */
  align-items: center; justify-content: center;
  height: 22px; flex-shrink: 0; position: relative; z-index: 5;   /* invisible-ish TAP zone... */
  margin: -8px 0;                /* ...pulled tight so it only takes ~6px of layout space */
  background: transparent;
  touch-action: none; cursor: grab;
  -webkit-user-select: none; user-select: none;
  -webkit-touch-callout: none;   /* stop iOS's long-press menu/magnifier from hijacking the hold */
}
.vgrab::before {                 /* the actual visual: one slim solid orange line */
  content: ""; width: 100%; height: 2px;
  background: var(--color-orange);
  box-shadow: 0 0 6px rgba(255, 122, 0, 0.55);
  transition: background 0.15s, height 0.15s, box-shadow 0.15s;
}
.vgrab.holding::before { background: #ffce7a; }         /* while you're holding to arm */
.vgrab.armed { cursor: grabbing; }
.vgrab.armed::before { background: #ff3b30; height: 3px; box-shadow: 0 0 8px rgba(255, 59, 48, 0.85); } /* RED = movable */

/* --- scrollbar styling (orange-tinted) --- */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(255, 122, 0, 0.35);
  border-radius: 8px;
}
::-webkit-scrollbar-thumb:hover { background: rgba(255, 122, 0, 0.6); }

/* ============================================================================
   [STYLE:PHONE]  —  iPhone home layout. The 3-column desktop layout doesn't fit a
   phone, so on narrow screens we STACK it: the nav buttons (New Chat, Calendar,
   Email, Actions, Logs, Settings) become a compact bar of pills across the TOP,
   and the chat fills the whole bottom (the big majority of the screen). The Tasks
   sidebar is hidden (it's an empty placeholder). iPad/desktop are wider than this
   breakpoint, so they keep the original 3-column layout untouched.
   (Tuned for iPhone 17 Pro Max — ~440px wide in portrait.)
   ============================================================================ */
@media (max-width: 600px) {
  #main { flex-direction: column; }

  /* left sidebar -> a wrapping top bar of pill buttons */
  #sidebar-left {
    width: auto;
    flex-shrink: 0;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    gap: 7px;
    padding: 9px 11px;
    border-right: none;
    border-bottom: none;              /* the drag divider (#grab-main) is the separator now */
    max-height: 25vh;                 /* top quarter-ish by default; draggable */
    overflow-y: auto;
  }
  #grab-main { display: flex; }       /* show the draggable divider on phone */
  #sidebar-left .nav-label { display: none; }   /* no "NAVIGATION" header on phone */
  #status-strip { display: none; }              /* hide the key/status strip on phone */

  .new-chat-btn { order: -1; width: auto; padding: 9px 13px; }

  .nav-list { flex-direction: row; flex-wrap: wrap; gap: 7px; flex: 1 1 auto; }
  .nav-item {
    padding: 8px 12px;
    border: 1px solid var(--line-soft);
    border-radius: 999px;             /* pill */
    font-size: 13px;
  }
  .nav-item.active { border-color: var(--line); }
  .nav-item.active::before { display: none; }   /* drop the vertical accent bar in pill mode */

  /* chat = the big bottom area */
  #chat { flex: 1; min-height: 0; }
  #messages { padding: 16px; }

  /* the Tasks sidebar has no room on a phone (and is an empty placeholder) */
  #sidebar-right { display: none; }

  #header { padding: 0 14px; }
}
</style>
</head>
